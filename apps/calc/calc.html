<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    }

    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      background: #000;
      overflow: hidden;
    }

    #display {
      flex: 0 0 35%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 0 20px 8px 20px;
      background: #000;
      position: relative;
    }

    #display-icons {
      position: absolute;
      top: 16px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 16px;
    }

    .display-icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1C1C1E;
      border: none;
      outline: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .display-icon-btn:active {
      background: #2C2C2E;
    }

    #display-preview {
      color: rgba(255, 255, 255, 0.5);
      font-size: 24px;
      font-weight: 300;
      height: 30px;
      line-height: 30px;
      text-align: right;
      width: 100%;
    }

    #display-number {
      color: #fff;
      font-size: 96px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -2px;
      text-align: right;
      width: 100%;
    }

    #button-grid {
      flex: 1 1 65%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 12px;
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom)) 12px;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: none;
      outline: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      line-height: 1;
    }

    /* 機能ボタン（⌫ AC %） */
    .btn-func {
      background: #A5A5A5;
      color: #fff;
      font-size: 34px;
      font-weight: 400;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.15);
    }
    .btn-func:active {
      background: #D4D4D2;
    }

    /* 数字ボタン（0〜9, ., +/−） */
    .btn-num {
      background: #333333;
      color: #fff;
      font-size: 34px;
      font-weight: 400;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.25);
    }
    .btn-num:active {
      background: #737373;
    }

    /* +/− は文字を小さく */
    #btn-sign {
      font-size: 22px;
      letter-spacing: -1px;
    }

    /* 演算子ボタン（÷ × − ＋ ＝） */
    .btn-op {
      background: #FF9F0A;
      color: #fff;
      font-size: 38px;
      font-weight: 300;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.15);
    }
    .btn-op:active {
      background: #FFB340;
    }

    /* 演算子ボタン（選択中状態）- S2で使うためCSSだけ定義 */
    .btn-op.btn-op-active {
      background: #fff;
      color: #FF9F0A;
    }
    .btn-op.btn-op-active:active {
      background: #FF9F0A;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="display">
      <div id="display-icons">
        <!-- 左上：履歴（時計）アイコン -->
        <button class="display-icon-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15 15"/>
          </svg>
        </button>
        <!-- 右上：電卓切替（キーパッド）アイコン -->
        <button class="display-icon-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
            <rect x="4" y="4" width="4" height="4" rx="1"/>
            <rect x="10" y="4" width="4" height="4" rx="1"/>
            <rect x="16" y="4" width="4" height="4" rx="1"/>
            <rect x="4" y="10" width="4" height="4" rx="1"/>
            <rect x="10" y="10" width="4" height="4" rx="1"/>
            <rect x="16" y="10" width="4" height="4" rx="1"/>
            <rect x="4" y="16" width="4" height="4" rx="1"/>
            <rect x="10" y="16" width="4" height="4" rx="1"/>
            <rect x="16" y="16" width="4" height="4" rx="1"/>
          </svg>
        </button>
      </div>
      <div id="display-preview"></div>
      <div id="display-number">0</div>
    </div>
    <div id="button-grid">
      <!-- 行1 -->
      <div class="cell">
        <button class="btn btn-func" id="btn-bs">
          <svg viewBox="0 0 28 20" width="28" height="20" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M10.5 0L0 10L10.5 20H28V0H10.5ZM22.5 13.5L21 15L17 11L13 15L11.5 13.5L15.5 9.5L11.5 5.5L13 4L17 8L21 4L22.5 5.5L18.5 9.5L22.5 13.5Z"/>
          </svg>
        </button>
      </div>
      <div class="cell">
        <button class="btn btn-func" id="btn-ac">AC</button>
      </div>
      <div class="cell">
        <button class="btn btn-func" id="btn-pct">%</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="div">÷</button>
      </div>
      <!-- 行2 -->
      <div class="cell">
        <button class="btn btn-num" data-digit="7">7</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="8">8</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="9">9</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="mul">×</button>
      </div>
      <!-- 行3 -->
      <div class="cell">
        <button class="btn btn-num" data-digit="4">4</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="5">5</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="6">6</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="sub">−</button>
      </div>
      <!-- 行4 -->
      <div class="cell">
        <button class="btn btn-num" data-digit="1">1</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="2">2</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="3">3</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" id="btn-add" data-op="add">＋</button>
      </div>
      <!-- 行5 -->
      <div class="cell">
        <button class="btn btn-num" id="btn-sign">+/−</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="0">0</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" id="btn-dot">.</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="eq">＝</button>
      </div>
    </div>
  </div>

  <script>
    // --- 状態変数 ---
    var displayValue     = '0';
    var firstOperand     = null;
    var operator         = null;
    var waitingForSecond = false;
    var lastOperator     = null;
    var lastOperand      = null;
    var justCalculated   = false;
    var expressionStr    = '';   // 入力中の式文字列（"456＋569＋" など）
    var completedExpr    = '';   // ＝後に preview に表示する式（"456＋569＝"）

    // --- OP記号マップ ---
    var opSymbols = { div: '÷', mul: '×', sub: '−', add: '＋' };

    // --- formatResult ---
    function formatResult(n) {
      if (isNaN(n) || !isFinite(n)) return 'Error';
      n = Math.round(n * 1e10) / 1e10;
      var s = String(n);
      // 9桁超なら toPrecision(9)
      var digits = s.replace(/[^0-9]/g, '');
      if (digits.length > 9) {
        s = parseFloat(n.toPrecision(9)).toString();
      }
      return s;
    }

    // --- calculate ---
    function calculate(a, op, b) {
      var result;
      if (op === 'div') {
        if (b === 0) return 'Error';
        result = a / b;
      } else if (op === 'mul') {
        result = a * b;
      } else if (op === 'sub') {
        result = a - b;
      } else if (op === 'add') {
        result = a + b;
      } else {
        return formatResult(a);
      }
      return formatResult(result);
    }

    // --- updateDisplay ---
    function updateDisplay() {
      var numEl     = document.getElementById('display-number');
      var previewEl = document.getElementById('display-preview');
      var acBtn     = document.getElementById('btn-ac');

      // メイン表示文字列を決定
      var displayStr;
      if (justCalculated) {
        displayStr = displayValue;
        previewEl.textContent = completedExpr;
      } else if (waitingForSecond) {
        displayStr = expressionStr;
        previewEl.textContent = '';
      } else {
        displayStr = expressionStr + displayValue;
        previewEl.textContent = '';
      }
      numEl.textContent = displayStr;

      // フォントサイズ（式全体の長さで決定）
      var len = displayStr.length;
      if (len <= 6)       numEl.style.fontSize = '96px';
      else if (len <= 8)  numEl.style.fontSize = '72px';
      else if (len <= 10) numEl.style.fontSize = '56px';
      else if (len <= 13) numEl.style.fontSize = '40px';
      else                numEl.style.fontSize = '30px';

      // AC / C ラベル（＝後、または完全クリーン状態で AC）
      if (justCalculated || (expressionStr === '' && displayValue === '0' && firstOperand === null)) {
        acBtn.textContent = 'AC';
      } else {
        acBtn.textContent = 'C';
      }
    }

    // --- updateOperatorHighlight ---
    function updateOperatorHighlight() {
      var opBtns = document.querySelectorAll('.btn-op');
      opBtns.forEach(function(btn) {
        btn.classList.remove('btn-op-active');
      });
      if (operator !== null && waitingForSecond) {
        var target = document.querySelector('[data-op="' + operator + '"]');
        if (target) target.classList.add('btn-op-active');
      }
    }

    // --- 数字入力 ---
    function pressDigit(digit) {
      if (displayValue === 'Error') return;
      if (justCalculated) {
        // 全リセットして新規入力
        firstOperand     = null;
        operator         = null;
        lastOperator     = null;
        lastOperand      = null;
        waitingForSecond = false;
        justCalculated   = false;
        expressionStr    = '';
        completedExpr    = '';
        displayValue     = digit;
        updateDisplay();
        updateOperatorHighlight();
        return;
      }
      if (waitingForSecond) {
        displayValue     = digit;
        waitingForSecond = false;
      } else {
        // 桁数制限（符号・小数点除いた数字のみ9桁）
        var digits = displayValue.replace(/[^0-9]/g, '');
        if (digits.length >= 9) return;
        if (displayValue === '0') {
          displayValue = digit;
        } else {
          displayValue += digit;
        }
      }
      updateDisplay();
    }

    // --- 小数点 ---
    function pressDot() {
      if (displayValue === 'Error') return;
      if (displayValue.indexOf('.') !== -1) return;
      if (waitingForSecond) {
        displayValue     = '0.';
        waitingForSecond = false;
      } else {
        displayValue += '.';
      }
      updateDisplay();
    }

    // --- 演算子 ---
    function pressOperator(op) {
      if (displayValue === 'Error') return;

      // 式文字列を更新（計算前に displayValue が変わるため先に処理）
      if (justCalculated) {
        // ＝後に演算子 → 結果を起点に新しい式を開始
        expressionStr = displayValue + opSymbols[op];
        completedExpr = '';
      } else if (waitingForSecond) {
        // 演算子の変更（数字を入力せずに別の演算子を押した）
        expressionStr = expressionStr.slice(0, -1) + opSymbols[op];
      } else {
        // 通常：現在の displayValue を式に追加
        expressionStr += displayValue + opSymbols[op];
      }

      if (firstOperand !== null && !waitingForSecond) {
        // 連続演算：その場で計算
        var result = calculate(firstOperand, operator, parseFloat(displayValue));
        displayValue  = result;
        firstOperand  = (result === 'Error') ? null : parseFloat(result);
      } else if (firstOperand === null) {
        firstOperand = parseFloat(displayValue);
      }
      operator         = op;
      waitingForSecond = true;
      justCalculated   = false;
      lastOperator     = null;
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- ＝ ---
    function pressEqual() {
      if (firstOperand === null && lastOperator === null) return;
      var result;
      if (justCalculated) {
        // ＝連打：lastOperator と lastOperand で再計算
        result       = calculate(parseFloat(displayValue), lastOperator, lastOperand);
        displayValue = result;
        if (result !== 'Error') firstOperand = parseFloat(result);
        completedExpr = '';
      } else {
        var inputVal = displayValue;   // ＝前の入力値を保存
        lastOperand  = parseFloat(displayValue);
        lastOperator = operator;
        result       = calculate(firstOperand, operator, lastOperand);
        displayValue = result;
        if (result !== 'Error') firstOperand = parseFloat(result);
        completedExpr = expressionStr + inputVal + '＝';
        expressionStr = '';
      }
      operator         = null;
      waitingForSecond = false;
      justCalculated   = true;
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- AC / C ---
    function pressAC() {
      if (justCalculated || (expressionStr === '' && displayValue === '0' && firstOperand === null)) {
        // AC：全リセット
        firstOperand     = null;
        operator         = null;
        lastOperator     = null;
        lastOperand      = null;
        waitingForSecond = false;
        justCalculated   = false;
        expressionStr    = '';
        completedExpr    = '';
      }
      // C
      displayValue     = '0';
      waitingForSecond = false;
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- バックスペース ---
    function pressBS() {
      if (justCalculated || waitingForSecond) return;
      if (displayValue === 'Error') return;
      displayValue = displayValue.slice(0, -1);
      if (displayValue === '' || displayValue === '-') {
        displayValue = '0';
      }
      updateDisplay();
    }

    // --- +/− ---
    function pressSign() {
      if (displayValue === '0' || displayValue === 'Error') return;
      if (displayValue.charAt(0) === '-') {
        displayValue = displayValue.slice(1);
      } else {
        displayValue = '-' + displayValue;
      }
      updateDisplay();
    }

    // --- % ---
    function pressPct() {
      if (displayValue === 'Error') return;
      var val = parseFloat(displayValue);
      var result;
      if (operator === 'add' || operator === 'sub') {
        result = firstOperand * (val / 100);
      } else {
        result = val / 100;
      }
      displayValue = formatResult(result);
      updateDisplay();
    }

    // --- ＋ボタンのタッチ処理（long-press hook あり） ---
    var addBtn        = document.getElementById('btn-add');
    var addPressTimer = null;
    var addLongPressed = false;

    addBtn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      addLongPressed = false;
      addPressTimer  = setTimeout(function() {
        addLongPressed = true;
        onAddLongPress();
      }, 3000);
    }, { passive: false });

    addBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      clearTimeout(addPressTimer);
      if (!addLongPressed) {
        pressOperator('add');
      }
      addLongPressed = false;
    }, { passive: false });

    addBtn.addEventListener('touchcancel', function() {
      clearTimeout(addPressTimer);
      addLongPressed = false;
    });

    // マウス対応（PC確認用）
    addBtn.addEventListener('mousedown', function() {
      addLongPressed = false;
      addPressTimer  = setTimeout(function() {
        addLongPressed = true;
        onAddLongPress();
      }, 3000);
    });
    addBtn.addEventListener('mouseup', function() {
      clearTimeout(addPressTimer);
      if (!addLongPressed) {
        pressOperator('add');
      }
      addLongPressed = false;
    });
    addBtn.addEventListener('mouseleave', function() {
      clearTimeout(addPressTimer);
      addLongPressed = false;
    });

    // S3で上書きされるフック（今は空）
    function onAddLongPress() {
      // S3実装予定
    }

    // --- その他ボタンのイベント登録ヘルパー ---
    function bindBtn(el, action) {
      el.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
      el.addEventListener('touchend',   function(e) { e.preventDefault(); action(); }, { passive: false });
      el.addEventListener('click',      function()  { action(); });
    }

    // 数字ボタン
    document.querySelectorAll('[data-digit]').forEach(function(btn) {
      var d = btn.getAttribute('data-digit');
      bindBtn(btn, function() { pressDigit(d); });
    });

    // 演算子ボタン（＋以外）
    ['div', 'mul', 'sub'].forEach(function(op) {
      var btn = document.querySelector('[data-op="' + op + '"]');
      if (btn) bindBtn(btn, function() { pressOperator(op); });
    });

    // ＝
    bindBtn(document.querySelector('[data-op="eq"]'), pressEqual);

    // 小数点
    bindBtn(document.getElementById('btn-dot'),  pressDot);

    // AC/C
    bindBtn(document.getElementById('btn-ac'),   pressAC);

    // バックスペース
    bindBtn(document.getElementById('btn-bs'),   pressBS);

    // +/−
    bindBtn(document.getElementById('btn-sign'), pressSign);

    // %
    bindBtn(document.getElementById('btn-pct'),  pressPct);

    // --- 初期表示 ---
    updateDisplay();
  </script>
</body>
</html>
