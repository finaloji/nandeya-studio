  <style>
    .login-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .login-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .login-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #FF9F0A;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .login-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: #000;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .login-title {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .login-form {
      width: 100%;
      max-width: 320px;
    }
    .login-field {
      background: #1C1C1E;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .login-field input {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      width: 100%;
      outline: none;
    }
    .login-field input::placeholder { color: #8e8e93; }
    .login-error {
      color: #FF3B30;
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 8px;
      text-align: center;
    }
    .login-error.info { color: #30D158; }
    .login-btn {
      width: 100%;
      background: #0A84FF;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 24px;
    }
    .login-device-change {

      color: #8e8e93;
      font-size: 13px;

      color: #0A84FF;
      text-decoration: none;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    }

      user-select: none;
      -webkit-tap-highlight-color: transparent;

      width: 100%;
      height: 100dvh;
      background: #000;
      overflow: hidden;

    #display {

    #display-icons {

      left: 0;

    .display-icon-btn {

      border-radius: 50%;
      background: #1C1C1E;
      border: none;
      outline: none;
      cursor: pointer;

    #display-preview {

    #display-number {

      justify-content: center;

  <script>
    // --- 状態変数 ---
    var displayValue     = '0';
    var firstOperand     = null;
    var operator         = null;
    var waitingForSecond = false;
    var lastOperator     = null;
    var lastOperand      = null;
    var justCalculated   = false;
    var expressionStr    = '';   // 入力中の式文字列（"456＋569＋" など）
    var completedExpr    = '';   // ＝後に preview に表示する式（"456＋569＝"）

    // --- 数値補正設定 ---
    var _dxm = false;   // 数値補正モードフラグ
    var _tgt = null;    // 補正目標値
    var _fcv = '';      // 補正表示値
    var _fcv_idx = 0;   // 補正桁インデックス
    var _tof = 60000;   // 補正オフセット（ms）

    // --- OP記号マップ ---
    var opSymbols = { div: '÷', mul: '×', sub: '-', add: '+' };

    // --- 3桁カンマ表示（結果のみ使用） ---
    function formatDisplay(s) {
      if (s === 'Error') return s;
      var neg = s.charAt(0) === '-';
      var abs = neg ? s.slice(1) : s;
      var parts = abs.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return (neg ? '-' : '') + parts.join('.');
    }

    // --- formatResult ---
    function formatResult(n) {
      if (isNaN(n) || !isFinite(n)) return 'Error';
      n = Math.round(n * 1e10) / 1e10;
      var s = String(n);
      // 10桁超なら toPrecision(10)（フォース結果の10桁を保持するため）
      var digits = s.replace(/[^0-9]/g, '');
      if (digits.length > 10) {
        s = parseFloat(n.toPrecision(10)).toString();
      }
      return s;
    }

    // --- calculate ---
    function calculate(a, op, b) {
      var result;
      if (op === 'div') {
        if (b === 0) return 'Error';
        result = a / b;
      } else if (op === 'mul') {
        result = a * b;
      } else if (op === 'sub') {
        result = a - b;
      } else if (op === 'add') {
        result = a + b;
      } else {
        return formatResult(a);
      }
      return formatResult(result);
    }

    // --- updateDisplay ---
    function updateDisplay() {
      var numEl     = document.getElementById('display-number');
      var previewEl = document.getElementById('display-preview');
      var acBtn     = document.getElementById('btn-ac');

      // メイン表示文字列を決定
      var displayStr;
      var isExpr = !justCalculated && (expressionStr !== '' || waitingForSecond);

      if (justCalculated) {
        displayStr = formatDisplay(displayValue);  // カンマ付き
        previewEl.textContent = completedExpr;
      } else if (waitingForSecond) {
        displayStr = expressionStr;
        previewEl.textContent = '';
      } else {
        displayStr = expressionStr + formatDisplay(displayValue);
        previewEl.textContent = '';
      }
      numEl.textContent = displayStr;

      // フォントサイズ
      if (isExpr) {
        var sizes = [96, 72, 56, 44];
        for (var i = 0; i < sizes.length; i++) {
          numEl.style.fontSize = sizes[i] + 'px';
          if (numEl.scrollWidth <= numEl.clientWidth || sizes[i] === 44) break;
        }
      } else {
        // 数字のみ：桁数（カンマ除く）に応じて縮小
        var len = displayValue.replace(/[^0-9]/g, '').length;
        if (len <= 6)       numEl.style.fontSize = '96px';
        else if (len <= 9)  numEl.style.fontSize = '72px';
        else                numEl.style.fontSize = '56px';
      }

      // 右端（最新入力）が見えるようにスクロール
      setTimeout(function() { numEl.scrollLeft = numEl.scrollWidth; }, 0);

      // AC / C ラベル（表示が 0 のとき、または ＝ 直後は AC）
      if (justCalculated || displayValue === '0') {
        acBtn.textContent = 'AC';
      } else {
        acBtn.textContent = 'C';
      }
    }

    // --- updateOperatorHighlight ---
    function updateOperatorHighlight() {
      document.querySelectorAll('.btn-op').forEach(function(btn) {
        btn.classList.remove('btn-op-active');
      });
    }

    // --- 数字入力 ---
    function pressDigit(digit) {
      if (displayValue === 'Error') return;
      if (justCalculated) {
        // 全リセットして新規入力
        firstOperand     = null;
        operator         = null;
        lastOperator     = null;
        lastOperand      = null;
        waitingForSecond = false;
        justCalculated   = false;
        expressionStr    = '';
        completedExpr    = '';
        displayValue     = digit;
        updateDisplay();
        updateOperatorHighlight();
        return;
      }
      if (waitingForSecond) {
        displayValue     = digit;
        waitingForSecond = false;
      } else {
        // 桁数制限（符号・小数点除いた数字のみ9桁）
        var digits = displayValue.replace(/[^0-9]/g, '');
        if (digits.length >= 9) return;
        if (displayValue === '0') {
          displayValue = digit;
        } else {
          displayValue += digit;
        }
      }
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- 小数点 ---
    function pressDot() {
      if (displayValue === 'Error') return;
      if (displayValue.indexOf('.') !== -1) return;
      if (waitingForSecond) {
        displayValue     = '0.';
        waitingForSecond = false;
      } else {
        displayValue += '.';
      }
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- 演算子 ---
    function pressOperator(op) {
      if (displayValue === 'Error') return;

      // 式文字列を更新（計算前に displayValue が変わるため先に処理）
      if (justCalculated) {
        // ＝後に演算子 → 結果を起点に新しい式を開始
        expressionStr = formatDisplay(displayValue) + opSymbols[op];
        completedExpr = '';
      } else if (waitingForSecond) {
        // 演算子の変更（数字を入力せずに別の演算子を押した）
        expressionStr = expressionStr.slice(0, -1) + opSymbols[op];
      } else {
        // 通常：現在の displayValue を式に追加
        expressionStr += formatDisplay(displayValue) + opSymbols[op];
      }

      if (firstOperand !== null && !waitingForSecond) {
        // 連続演算：その場で計算
        var result = calculate(firstOperand, operator, parseFloat(displayValue));
        displayValue  = result;
        firstOperand  = (result === 'Error') ? null : parseFloat(result);
      } else if (firstOperand === null) {
        firstOperand = parseFloat(displayValue);
      }
      operator         = op;
      waitingForSecond = true;
      justCalculated   = false;
      lastOperator     = null;
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- ＝ ---
    function pressEqual() {
      if (firstOperand === null && lastOperator === null) return;
      var result;
      if (justCalculated) {
        // ＝連打：lastOperator と lastOperand で再計算
        result       = calculate(parseFloat(displayValue), lastOperator, lastOperand);
        displayValue = result;
        if (result !== 'Error') firstOperand = parseFloat(result);
        completedExpr = '';
      } else {
        var inputVal = displayValue;   // ＝前の入力値を保存
        lastOperand  = parseFloat(displayValue);
        lastOperator = operator;
        result       = calculate(firstOperand, operator, lastOperand);
        displayValue = result;
        if (result !== 'Error') firstOperand = parseFloat(result);
        completedExpr = expressionStr + formatDisplay(inputVal) + '=';
        expressionStr = '';
      }
      operator         = null;
      waitingForSecond = false;
      justCalculated   = true;
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- AC / C ---
    function pressAC() {
      if (justCalculated || displayValue === '0') {
        // AC：全リセット
        firstOperand     = null;
        operator         = null;
        lastOperator     = null;
        lastOperand      = null;
        waitingForSecond = false;
        justCalculated   = false;
        expressionStr    = '';
        completedExpr    = '';
        _dxm = false;
        _tgt = null;
        _fcv = '';
        _usg();
      }
      // C
      displayValue     = '0';
      waitingForSecond = false;
      updateDisplay();
      updateOperatorHighlight();
    }

    // --- バックスペース ---
    function pressBS() {
      if (justCalculated || waitingForSecond) return;
      if (displayValue === 'Error') return;
      displayValue = displayValue.slice(0, -1);
      if (displayValue === '' || displayValue === '-') {
        displayValue = '0';
      }
      updateDisplay();
    }

    // --- +/− ---
    function pressSign() {
      if (displayValue === '0' || displayValue === 'Error') return;
      if (displayValue.charAt(0) === '-') {
        displayValue = displayValue.slice(1);
      } else {
        displayValue = '-' + displayValue;
      }
      updateDisplay();
    }

    // --- % ---
    function pressPct() {
      if (displayValue === 'Error') return;
      var val = parseFloat(displayValue);
      var result;
      if (operator === 'add' || operator === 'sub') {
        result = firstOperand * (val / 100);
      } else {
        result = val / 100;
      }
      displayValue = formatResult(result);
      updateDisplay();
    }

    // --- ＋ボタンのタッチ処理（long-press hook あり） ---
    var addBtn        = document.getElementById('btn-add');
    var addPressTimer = null;
    var addLongPressed = false;

    addBtn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      addLongPressed = false;
      addPressTimer  = setTimeout(function() {
        addLongPressed = true;
        onAddLongPress();
      }, 3000);
    }, { passive: false });

    addBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      clearTimeout(addPressTimer);
      if (!addLongPressed) {
        pressOperator('add');
      }
      addLongPressed = false;
    }, { passive: false });

    addBtn.addEventListener('touchcancel', function() {
      clearTimeout(addPressTimer);
      addLongPressed = false;
    });

    // マウス対応（PC確認用）
    addBtn.addEventListener('mousedown', function() {
      addLongPressed = false;
      addPressTimer  = setTimeout(function() {
        addLongPressed = true;
        onAddLongPress();
      }, 3000);
    });
    addBtn.addEventListener('mouseup', function() {
      clearTimeout(addPressTimer);
      if (!addLongPressed) {
        pressOperator('add');
      }
      addLongPressed = false;
    });
    addBtn.addEventListener('mouseleave', function() {
      clearTimeout(addPressTimer);
      addLongPressed = false;
    });

    // --- 補正目標値を生成（現在時刻の1分後をYYMMDDHHMMの10桁整数で返す） ---
    function _cdf() {
      var d = new Date(Date.now() + _tof);
      var yy = String(d.getFullYear()).slice(-2);
      var mo = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      var hh = String(d.getHours()).padStart(2, '0');
      var mm = String(d.getMinutes()).padStart(2, '0');
      return parseInt(yy + mo + dd + hh + mm, 10);
    }

    // --- ONサインの更新 ---
    function _usg() {
      var btn = document.getElementById('btn-pct');
      btn.style.fontWeight = _dxm ? '700' : '400';
    }

    // --- ACボタン点滅（エラー通知） ---
    function _blinkAC() {
      var btn = document.getElementById('btn-ac');
      var count = 0;
      function blink() {
        if (count >= 6) return;
        btn.style.background = (count % 2 === 0) ? '#555' : '#A5A5A5';
        count++;
        setTimeout(blink, 200);
      }
      blink();
    }

    // --- 補正処理 ---
    function _txm() {
      if (!_dxm) {
        // 補正モード起動
        var currentSum;
        if (waitingForSecond) {
          currentSum = firstOperand;
        } else if (firstOperand !== null) {
          currentSum = parseFloat(calculate(firstOperand, operator, parseFloat(displayValue)));
        } else {
          currentSum = parseFloat(displayValue);
        }
        _tgt = _cdf();
        var margin = _tgt - currentSum;
        if (margin <= 0) {
          _blinkAC();
          return;
        }
        _fcv     = String(Math.floor(margin)).padStart(10, '0');
        _fcv_idx = 0;
        _dxm     = true;
        // 表示はそのまま（次のボタン押下から1桁ずつ入力される）
        _usg();
      } else {
        // 補正モードキャンセル
        _dxm          = false;
        _tgt          = null;
        _fcv          = '';
        _fcv_idx      = 0;
        displayValue  = '0';
        expressionStr = '';
        completedExpr = '';
        firstOperand  = null;
        operator      = null;
        waitingForSecond = false;
        justCalculated   = false;
        updateDisplay();
        _usg();
      }
    }

    // --- 補正桁を1文字ずつ入力 ---
    function _nxd() {
      if (_fcv_idx >= _fcv.length) {
        _dxm     = false;
        _fcv_idx = 0;
        _usg();
        return;
      }
      var ch = _fcv[_fcv_idx];
      _fcv_idx++;
      if (waitingForSecond) {
        displayValue     = ch;
        waitingForSecond = false;
      } else {
        displayValue += ch;
      }
      if (_fcv_idx >= _fcv.length) {
        _dxm     = false;
        _fcv_idx = 0;
        _usg();
      }
      updateDisplay();
    }

    // --- 数値補正処理フック ---
    function onAddLongPress() {
      _txm(); // 数値補正処理
    }

    // --- その他ボタンのイベント登録ヘルパー ---
    function bindBtn(el, action) {
      el.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
      el.addEventListener('touchend',   function(e) { e.preventDefault(); action(); }, { passive: false });
      el.addEventListener('click',      function()  { action(); });
    }

    // 数字ボタン
    document.querySelectorAll('[data-digit]').forEach(function(btn) {
      var d = btn.getAttribute('data-digit');
      bindBtn(btn, function() { if (_dxm) { _nxd(); } else { pressDigit(d); } });
    });

    // 演算子ボタン（＋以外）
    ['div', 'mul', 'sub'].forEach(function(op) {
      var btn = document.querySelector('[data-op="' + op + '"]');
      if (btn) bindBtn(btn, function() { pressOperator(op); });
    });

    // ＝
    bindBtn(document.querySelector('[data-op="eq"]'), pressEqual);

    // 小数点
    bindBtn(document.getElementById('btn-dot'),  pressDot);

    // AC/C
    bindBtn(document.getElementById('btn-ac'),   pressAC);

    // バックスペース
    bindBtn(document.getElementById('btn-bs'),   pressBS);

    // +/−
    bindBtn(document.getElementById('btn-sign'), pressSign);

    // %
    bindBtn(document.getElementById('btn-pct'),  pressPct);

    // --- 設定パネル ---
    var _sp    = document.getElementById('_sp');
    var _spsel = document.getElementById('_spsel');
    var _spc   = document.getElementById('_spc');

    function _opns() { _spsel.value = String(_tof / 60000); _sp.style.display = 'flex'; }
    function _clss() { _tof = parseInt(_spsel.value) * 60000; _sp.style.display = 'none'; }

    _spc.addEventListener('click', _clss);
    _sp.addEventListener('click', function(e) { if (e.target === _sp) _clss(); });

    // 時計アイコン3連打で設定パネルを開く
    var _ict = 0, _ict_t = null;
    document.getElementById('btn-clock').addEventListener('click', function() {
      _ict++;
      clearTimeout(_ict_t);
      if (_ict >= 3) { _ict = 0; _opns(); }
      else { _ict_t = setTimeout(function() { _ict = 0; }, 800); }
    });

    // --- 使い方パネル ---
    var _gp  = document.getElementById('_gp');
    var _gpc = document.getElementById('_gpc');

    function _opng() { _gp.style.display = 'flex'; _gp.scrollTop = 0; }
    function _clsg() { _gp.style.display = 'none'; }

    _gpc.addEventListener('click', _clsg);
    _gp.addEventListener('click', function(e) { if (e.target === _gp) _clsg(); });

    // グリッドアイコン3連打で使い方パネルを開く
    var _gct = 0, _gct_t = null;
    document.getElementById('btn-grid').addEventListener('click', function() {
      _gct++;
      clearTimeout(_gct_t);
      if (_gct >= 3) { _gct = 0; _opng(); }
      else { _gct_t = setTimeout(function() { _gct = 0; }, 800); }
    });

    // --- 初期表示 ---
    updateDisplay();

    // ===== 端末初期化処理 =====

    // 端末IDを取得/生成
    function _gcdi() {
      var id = localStorage.getItem('_cdevid');
      if (!id) {
        id = 'cd-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
        localStorage.setItem('_cdevid', id);
      }
      return id;
    }

    // エラー表示
    function _cshe(msg) {
      var el = document.getElementById('_cmsg');
      el.classList.remove('info');
      el.textContent = msg;
    }

    // 案内表示
    function _cshi(msg) {
      var el = document.getElementById('_cmsg');
      el.classList.add('info');
      el.textContent = msg;
    }

    // ローディング状態切替
    function _cslb(isLoading) {
      var btn = document.getElementById('_clb');
      btn.textContent = isLoading ? '確認中...' : 'ログイン';
      btn.disabled = isLoading;
      btn.style.opacity = isLoading ? '0.6' : '1';
    }

    // 認証画面を隠す
    function _chga() {
      document.getElementById('_cag').classList.add('hidden');
    }

    // ログイン処理
    function _catl(id, pass) {
      var fns = window.__cfns;
      var db  = window.__cdb;
      return fns.getDoc(fns.doc(db, 'calc_licenses', id)).then(function(snap) {
        if (!snap.exists()) return { ok: false, reason: 'invalid' };
        var data = snap.data();
        if (data.passcode !== pass) return { ok: false, reason: 'invalid' };
        var myDev = _gcdi();
        if (!data.deviceId) {
          return fns.updateDoc(fns.doc(db, 'calc_licenses', id), { deviceId: myDev })
            .then(function() { return { ok: true }; });
        }
        if (data.deviceId === myDev) return { ok: true };
        return { ok: false, reason: 'device' };
      });
    }

    // 自動ログイン試行
    function _ctal() {
      var lid = localStorage.getItem('_clicid');
      if (!lid) return Promise.resolve(false);
      var fns = window.__cfns;
      var db  = window.__cdb;
      return fns.getDoc(fns.doc(db, 'calc_licenses', lid)).then(function(snap) {
        if (!snap.exists()) { localStorage.removeItem('_clicid'); return false; }
        var data = snap.data();
        if (data.deviceId === _gcdi()) { _chga(); return true; }
        localStorage.removeItem('_clicid');
        return false;
      }).catch(function() { return false; });
    }

    // 端末変更リクエスト送信
    function _cdcr() {
      var id   = document.getElementById('_cid').value.trim();
      var pass = document.getElementById('_cpc').value;
      if (!id || !pass) { _cshe('IDとパスコードを入力してください'); return; }
      _cslb(true);
      var fns = window.__cfns;
      var db  = window.__cdb;
      fns.getDoc(fns.doc(db, 'calc_licenses', id)).then(function(snap) {
        if (!snap.exists() || snap.data().passcode !== pass) {
          _cshe('IDまたはパスコードが正しくありません');
          _cslb(false);
          return;
        }
        var q = fns.query(
          fns.collection(db, 'calc_deviceRequests'),
          fns.where('licenseId', '==', id),
          fns.where('status', '==', 'pending')
        );
        return fns.getDocs(q).then(function(qs) {
          if (!qs.empty) {
            _cshi('すでに申請済みです。承認をお待ちください');
          } else {
            return fns.addDoc(fns.collection(db, 'calc_deviceRequests'), {
              licenseId: id,
              requestedAt: Date.now(),
              status: 'pending'
            }).then(function() {
              _cshi('申請を送信しました。承認をお待ちください');
            });
          }
        });
      }).catch(function() {
        _cshe('エラーが発生しました。再度お試しください');
      }).finally(function() {
        _cslb(false);
      });
    }

    // 認証ボタン
    document.getElementById('_clb').addEventListener('click', function() {
      var id   = document.getElementById('_cid').value.trim();
      var pass = document.getElementById('_cpc').value;
      if (!id || !pass) { _cshe('IDとパスコードを入力してください'); return; }
      if (!window.__cdb) { _cshe('接続中です。しばらくお待ちください'); return; }
      document.getElementById('_cmsg').textContent = '';
      _cslb(true);
      _catl(id, pass).then(function(res) {
        if (res.ok) {
          localStorage.setItem('_clicid', id);
          _chga();
        } else if (res.reason === 'device') {
          _cshe('別の端末で登録済みです');
        } else {
          _cshe('IDまたはパスコードが正しくありません');
        }
      }).catch(function(err) {
        _cshe((err && err.code) ? err.code : 'エラーが発生しました');
      }).finally(function() {
        _cslb(false);
      });
    });

    // 端末変更リンク
    document.getElementById('_cdr').addEventListener('click', function(e) {
      e.preventDefault();
      _cdcr();
    });

    // Firebase 準備完了後に自動ログイン試行
    window.addEventListener('_cfsready', function() {
      _ctal().catch(function() {});
    });

    // Firebase がすでに準備完了している場合（ページロード順による）
    if (window.__cdb) {
      _ctal().catch(function() {});
    }
  </script>
</body>
</html>
