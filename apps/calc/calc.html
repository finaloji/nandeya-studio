<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    }

    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      background: #000;
      overflow: hidden;
    }

    #display {
      flex: 0 0 35%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 0 20px 8px 20px;
      background: #000;
    }

    #display-preview {
      color: rgba(255, 255, 255, 0.5);
      font-size: 24px;
      font-weight: 300;
      height: 30px;
      line-height: 30px;
      text-align: right;
      width: 100%;
    }

    #display-number {
      color: #fff;
      font-size: 96px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -2px;
      text-align: right;
      width: 100%;
    }

    #button-grid {
      flex: 1 1 65%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 12px;
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom)) 12px;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: none;
      outline: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      line-height: 1;
    }

    /* 機能ボタン（⌫ AC %） */
    .btn-func {
      background: #A5A5A5;
      color: #fff;
      font-size: 34px;
      font-weight: 400;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.15);
    }
    .btn-func:active {
      background: #D4D4D2;
    }

    /* 数字ボタン（0〜9, ., +/−） */
    .btn-num {
      background: #333333;
      color: #fff;
      font-size: 34px;
      font-weight: 400;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.25);
    }
    .btn-num:active {
      background: #737373;
    }

    /* +/− は文字を小さく */
    #btn-sign {
      font-size: 22px;
      letter-spacing: -1px;
    }

    /* 演算子ボタン（÷ × − ＋ ＝） */
    .btn-op {
      background: #FF9F0A;
      color: #fff;
      font-size: 38px;
      font-weight: 300;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.15);
    }
    .btn-op:active {
      background: #FFB340;
    }

    /* 演算子ボタン（選択中状態）- S2で使うためCSSだけ定義 */
    .btn-op.btn-op-active {
      background: #fff;
      color: #FF9F0A;
    }
    .btn-op.btn-op-active:active {
      background: #FF9F0A;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="display">
      <div id="display-preview"></div>
      <div id="display-number">0</div>
    </div>
    <div id="button-grid">
      <!-- 行1 -->
      <div class="cell">
        <button class="btn btn-func" id="btn-bs">
          <svg viewBox="0 0 28 20" width="28" height="20" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M10.5 0L0 10L10.5 20H28V0H10.5ZM22.5 13.5L21 15L17 11L13 15L11.5 13.5L15.5 9.5L11.5 5.5L13 4L17 8L21 4L22.5 5.5L18.5 9.5L22.5 13.5Z"/>
          </svg>
        </button>
      </div>
      <div class="cell">
        <button class="btn btn-func" id="btn-ac">AC</button>
      </div>
      <div class="cell">
        <button class="btn btn-func" id="btn-pct">%</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="div">÷</button>
      </div>
      <!-- 行2 -->
      <div class="cell">
        <button class="btn btn-num" data-digit="7">7</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="8">8</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="9">9</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="mul">×</button>
      </div>
      <!-- 行3 -->
      <div class="cell">
        <button class="btn btn-num" data-digit="4">4</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="5">5</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="6">6</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="sub">−</button>
      </div>
      <!-- 行4 -->
      <div class="cell">
        <button class="btn btn-num" data-digit="1">1</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="2">2</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="3">3</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" id="btn-add" data-op="add">＋</button>
      </div>
      <!-- 行5 -->
      <div class="cell">
        <button class="btn btn-num" id="btn-sign">+/−</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" data-digit="0">0</button>
      </div>
      <div class="cell">
        <button class="btn btn-num" id="btn-dot">.</button>
      </div>
      <div class="cell">
        <button class="btn btn-op" data-op="eq">＝</button>
      </div>
    </div>
  </div>

  <script>
  </script>
</body>
</html>
