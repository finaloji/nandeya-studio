<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  #v {
    position: fixed;
    inset: 0;
    background-color: #000;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
  }
  #_w {
    position: absolute;
    top: 12%;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    display: none;
  }
  #_d {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,1);
    margin-bottom: 2px;
  }
  #_c {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    font-size: 25vw;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -3px;
    color: rgba(255,255,255,1);
  }
  #_g {
    position: fixed;
    inset: 0;
    display: none;
    box-sizing: border-box;
    padding: 22px;
    z-index: 10;
    background: #121212;
    color: #ededed;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }
  #_gc {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #_p {
    width: 100%;
    height: 240px;
    box-sizing: border-box;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    background-color: #000;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: contain;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 14px;
  }
  #_m {
    min-height: 18px;
    font-size: 13px;
    line-height: 1.4;
    color: #b7b7b7;
    text-align: center;
  }
  #_g button {
    -webkit-appearance: none;
    appearance: none;
    font-size: 16px;
    padding: 13px 16px;
    border: none;
    border-radius: 10px;
    background: #2b2b2b;
    color: #ededed;
  }
  #_g button:disabled {
    opacity: 0.4;
  }
  #_cd {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
  }
  #_cd span {
    font-size: 14px;
    text-align: center;
    color: #ededed;
  }
  #_f {
    display: none;
  }
  #_o {
    position: fixed;
    inset: 0;
    background: rgba(30,30,30,0.25);
    -webkit-backdrop-filter: blur(28px) saturate(1.2);
    backdrop-filter: blur(28px) saturate(1.2);
    opacity: 0;
    display: none;
    z-index: 20;
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    #_o {
      background: rgba(20,20,20,0.88);
    }
  }
  #_o1 {
    position: absolute;
    top: 50%;
    left: 50%;
    width: min(58vw, 46vh);
    height: min(58vw, 46vh);
    pointer-events: none;
    opacity: 0;
    filter: blur(12px);
    transform: translate(-50%, -50%);
  }
  #_o2 {
    display: block;
    width: 100%;
    height: 100%;
  }
  #_o5 {
    opacity: 0;
  }
  #_o6 {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(50% + min(29vw, 23vh) + 4vh);
    text-align: center;
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    font-size: 17px;
    font-weight: 400;
    color: rgba(255,255,255,0.95);
    pointer-events: none;
    opacity: 0;
  }
</style>
</head>
<body>
<div id="v"></div>
<div id="_w">
  <div id="_d"></div>
  <div id="_c"></div>
</div>
<div id="_g">
  <div id="_gc">
    <div id="_p"></div>
    <div id="_m"></div>
    <button id="_b1" type="button">画像を選択</button>
    <button id="_b2" type="button">消去</button>
    <div id="_cd">
      <span>選択した画像を消去しますか？</span>
      <button id="_b4" type="button">消去する</button>
      <button id="_b5" type="button">やめる</button>
    </div>
    <button id="_b3" type="button">閉じる</button>
  </div>
  <input id="_f" type="file" accept="image/*">
</div>
<div id="_o">
  <div id="_o1">
    <svg id="_o2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle id="_o7" cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="8.5" stroke-dasharray="282.74" stroke-dashoffset="0" transform="rotate(-90 50 50)"></circle>
      <circle id="_o3" cx="50" cy="50" r="45" fill="none" stroke="#ff453a" stroke-width="8.5" stroke-linecap="round" stroke-dasharray="282.74" stroke-dashoffset="282.74" transform="rotate(-90 50 50)"></circle>
      <path id="_o5" d="M13.5 2 L6 13.5 H11 L10.5 22 L18 10.5 H13 Z" fill="#ff453a" transform="translate(50 50) scale(1.8) translate(-12 -12)"></path>
    </svg>
  </div>
  <div id="_o6"></div>
</div>
