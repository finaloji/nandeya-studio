<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  #v {
    position: fixed;
    inset: 0;
    background-color: #000;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
  }
  #_w {
    position: absolute;
    top: 12%;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    display: none;
  }
  #_d {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,1);
    margin-bottom: 2px;
  }
  #_c {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    font-size: 25vw;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -3px;
    color: rgba(255,255,255,1);
  }
  #_g {
    position: fixed;
    inset: 0;
    display: none;
    box-sizing: border-box;
    padding: 22px;
    z-index: 10;
    background: #121212;
    color: #ededed;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }
  #_gc {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #_p {
    width: 100%;
    height: 240px;
    box-sizing: border-box;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    background-color: #000;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: contain;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 14px;
  }
  #_m {
    min-height: 18px;
    font-size: 13px;
    line-height: 1.4;
    color: #b7b7b7;
    text-align: center;
  }
  #_g button {
    -webkit-appearance: none;
    appearance: none;
    font-size: 16px;
    padding: 13px 16px;
    border: none;
    border-radius: 10px;
    background: #2b2b2b;
    color: #ededed;
  }
  #_g button:disabled {
    opacity: 0.4;
  }
  #_cd {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
  }
  #_cd span {
    font-size: 14px;
    text-align: center;
    color: #ededed;
  }
  #_f {
    display: none;
  }
  #_o {
    position: fixed;
    inset: 0;
    background: rgba(30,30,30,0.25);
    -webkit-backdrop-filter: blur(28px) saturate(1.2);
    backdrop-filter: blur(28px) saturate(1.2);
    opacity: 0;
    display: none;
    z-index: 20;
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    #_o {
      background: rgba(20,20,20,0.88);
    }
  }
  #_o1 {
    position: absolute;
    top: 50%;
    left: 50%;
    width: min(58vw, 46vh);
    height: min(58vw, 46vh);
    pointer-events: none;
    opacity: 0;
    filter: blur(12px);
    transform: translate(-50%, -50%);
  }
  #_o2 {
    display: block;
    width: 100%;
    height: 100%;
  }
  #_o5 {
    opacity: 0;
  }
  #_o6 {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(50% + min(29vw, 23vh) + 4vh);
    text-align: center;
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    font-size: 17px;
    font-weight: 400;
    color: rgba(255,255,255,0.95);
    pointer-events: none;
    opacity: 0;
  }
</style>
</head>
<body>
<div id="v"></div>
<div id="_w">

</div>
<div id="_g">
  <div id="_gc">

      <span>選択した画像を消去しますか？</span>

      <button id="_b5" type="button">やめる</button>
    </div>
    <button id="_b3" type="button">閉じる</button>
  </div>
  <input id="_f" type="file" accept="image/*">
</div>
<div id="_o">
  <div id="_o1">
    <svg id="_o2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle id="_o7" cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="8.5" stroke-dasharray="282.74" stroke-dashoffset="0" transform="rotate(-90 50 50)"></circle>
      <circle id="_o3" cx="50" cy="50" r="45" fill="none" stroke="#ff453a" stroke-width="8.5" stroke-linecap="round" stroke-dasharray="282.74" stroke-dashoffset="282.74" transform="rotate(-90 50 50)"></circle>
      <path id="_o5" d="M13.5 2 L6 13.5 H11 L10.5 22 L18 10.5 H13 Z" fill="#ff453a" transform="translate(50 50) scale(1.8) translate(-12 -12)"></path>
    </svg>
  </div>
  <div id="_o6"></div>
</div>
<script>
(function () {

  var _sn = '_s1';

  var _C = document.getElementById('_c');

  var _P = document.getElementById('_p');
  var _M = document.getElementById('_m');
  var _B1 = document.getElementById('_b1');
  var _B2 = document.getElementById('_b2');
  var _B3 = document.getElementById('_b3');
  var _B4 = document.getElementById('_b4');
  var _B5 = document.getElementById('_b5');
  var _CD = document.getElementById('_cd');
  var _F = document.getElementById('_f');
  var _O = document.getElementById('_o');
  var _O1 = document.getElementById('_o1');
  var _O3 = document.getElementById('_o3');
  var _O5 = document.getElementById('_o5');
  var _O6 = document.getElementById('_o6');
  var _O7 = document.getElementById('_o7');

  var _al = null;
  var _ft = null;
  var _ar = false;
  var _fd = false;

  var _op = false;
  var _tc = 0;
  var _t0 = 0;
  var _pt = 0;
  var _lp = null;
  var _bz = false;
  var _hv = false;
  var _cu = null;
  var _mu = null;
  var _pg = false;
  var _wd = ['日', '月', '火', '水', '木', '金', '土'];

  function _z(n) {
    return n < 10 ? '0' + n : '' + n;
  }

  function _tk() {
    var n = new Date();
    _D.textContent = (n.getMonth() + 1) + '月' + n.getDate() + '日 (' + _wd[n.getDay()] + ')';
    _C.textContent = _z(n.getHours()) + ':' + _z(n.getMinutes());
  }

  function _sh() {
    if (_pg && !_op) {
      _tk();
      _W.style.display = 'block';

  function _od() {
    return new Promise(function (res, rej) {
      var rq = indexedDB.open(_dn, 1);
      rq.onupgradeneeded = function () {
        var db = rq.result;

    return new Promise(function (res, rej) {

      } catch (e) { rej(e); return; }
      rq.onsuccess = function () { res(rq.result); };
      rq.onerror = function () { rej(rq.error); };

  function _wv(val) {

        tx.onerror = function () { db.close(); rej(tx.error); };

        tx.onerror = function () { db.close(); rej(tx.error); };

  function _su(v) {

      .then(function () {

        if (v instanceof Blob) { _mu = u; }
        _V.style.backgroundImage = 'url("' + u + '")';

        _sh();

      .catch(function () {

  function _in() {
    _gvp()
      .then(function (v) { return _su(v); })

  }

  function _pv(v) {
    if (_cu) { URL.revokeObjectURL(_cu); _cu = null; }

    if (v instanceof Blob) { u = URL.createObjectURL(v); _cu = u; }

  }

  function _ph() {
    if (_cu) { URL.revokeObjectURL(_cu); _cu = null; }

  }

  function _rf() {
    _gvp()
      .then(function (v) {
        if (v instanceof Blob || (typeof v === 'string' && v)) {
          _pv(v);
          _hv = true;
          _B2.disabled = false;
        } else {
          _ph();
          _hv = false;
          _B2.disabled = true;
        }
      })
      .catch(function () {
        _ph();
        _hv = false;
        _B2.disabled = true;

  }

  function _cn() {
    _CD.style.display = 'none';
  }

  function _bl(on) {
    _bz = on;
    _B1.disabled = on;
    _B4.disabled = on;
    _B2.disabled = on ? true : !_hv;
  }

  function _ow() {
    _ra();
    _rs();
    _op = true;
    _sh();
    _cn();
    _mt('');
    _G.style.display = 'flex';
    _rf();
  }

  function _cw() {
    _G.style.display = 'none';
    _op = false;
    _sh();
    _cn();
    if (_cu) { URL.revokeObjectURL(_cu); _cu = null; }
  }

  function _rs() {
    _tc = 0;
    _t0 = 0;
    _pt = 0;
    if (_lp) { clearTimeout(_lp); _lp = null; }
  }

  function _hs(x, y) {
    var w = Math.max(60, window.innerWidth * 0.15);
    var h = Math.max(60, window.innerHeight * 0.15);
    return x >= 0 && x <= w && y >= 0 && y <= h;
  }

  function _ha(x, y) {
    var w = Math.max(60, window.innerWidth * 0.15);
    var h = Math.max(60, window.innerHeight * 0.15);
    return x >= window.innerWidth - w && y >= window.innerHeight - h;
  }

  function _ra() {
    if (_al) { clearTimeout(_al); _al = null; }
    if (_ft) { clearTimeout(_ft); _ft = null; }
    _ar = false;
  }

  var _xr = null;
  var _xz = 0;
  var _xp = 0;
  var _xc = 282.74;

  function _xq(p) {
    return p > 20 ? '#32d74b' : '#ff453a';
  }

  function _xb(q) {
    var c = _xq(q);
    _O3.style.strokeDashoffset = _xc * (1 - q / 100);
    _O3.style.stroke = c;
    _O5.style.fill = c;
  }

  function _xa(p) {
    _xb(p);
    _O6.textContent = p + '% 充電済み';
  }

  function _xw(w) {
    var s = (_xc * (1 - w)) + ' ' + _xc;
    var o = -(_xc * w);
    _O3.style.strokeDasharray = s;
    _O3.style.strokeDashoffset = o;
    _O7.style.strokeDasharray = s;
    _O7.style.strokeDashoffset = o;
  }

  function _fb(ts) {
    var t = ts - _xz;
    var u, p;
    if (t < 0) { t = 0; }
    if (t < 600) {
      _O.style.opacity = t / 600;
    } else if (t < 9900) {
      _O.style.opacity = '1';
    }
    if (t >= 600) {
      if (t < 1400) {
        u = (t - 600) / 800;
        u = 1 - (1 - u) * (1 - u) * (1 - u);
        _O1.style.opacity = u;
        _O1.style.filter = 'blur(' + (12 * (1 - u)) + 'px)';
      } else {
        _O1.style.opacity = '1';
        _O1.style.filter = 'none';
      }
    }
    if (t >= 1400 && t < 9400) {
      u = (t - 1400) / 350;
      if (u > 1) { u = 1; }
      _O5.style.opacity = u;
    }
    if (t >= 1750 && t < 9400) {
      u = (t - 1750) / 350;
      if (u > 1) { u = 1; }
      _O6.style.opacity = u;
    }
    if (t < 1400) {
      _xb(0);
    } else if (t < 1750) {
      u = (t - 1400) / 350;
      u = 1 - (1 - u) * (1 - u) * (1 - u);
      _xb(_xp * u);
      _O6.textContent = _xp + '% 充電済み';
    } else if (t < 2400) {
      _xa(_xp);
    } else if (t < 9200) {
      u = (t - 2400) / 6800;
      p = u * u * (3 - 2 * u);
      u = 0.65 * u + 0.35 * p;
      p = Math.floor(_xp + (100 - _xp) * u);
      if (p > 100) { p = 100; }
      _xa(p);
    } else {
      _xa(100);
    }
    if (t >= 9400) {
      u = (t - 9400) / 500;
      if (u > 1) { u = 1; }
      _xw(u * u * u);
      p = 1 - (t - 9400) / 300;
      if (p < 0) { p = 0; }
      _O5.style.opacity = p;
      _O6.style.opacity = p;
      if (u >= 1) { _O1.style.opacity = '0'; }
    }
    if (t >= 9900) {
      u = 1 - (t - 9900) / 600;
      if (u < 0) { u = 0; }
      _O.style.opacity = u;
      if (t >= 10500) {
        _xr = null;
        _ds();
        return;
      }
    }
    _xr = requestAnimationFrame(_fb);
  }

  function _fx() {
    if (_xr !== null) { cancelAnimationFrame(_xr); _xr = null; }
    _O.style.opacity = '0';
    _O1.style.opacity = '0';
    _O1.style.filter = 'blur(12px)';
    _O5.style.opacity = '0';
    _O6.style.opacity = '0';
    _O6.textContent = '';
    _O3.style.strokeDasharray = '';
    _O3.style.strokeDashoffset = '';
    _O3.style.stroke = '';
    _O5.style.fill = '';
    _O7.style.strokeDasharray = '';
    _O7.style.strokeDashoffset = '';
  }

  function _fa() {
    _fx();
    _xp = 5 + Math.floor(Math.random() * 6);
    _xb(0);
    _xz = performance.now();
    _xr = requestAnimationFrame(_fb);
  }

  function _da() {
    _al = null;
    if (_op || _fd) { return; }
    if (_ar) { return; }
    _ar = true;
    _ft = setTimeout(_fr, 8000);
  }

  function _fr() {
    _ft = null;
    if (_op) { _ra(); return; }
    _fd = true;
    _W.style.display = 'none';
    _O.style.display = 'block';
    _fa();
  }

  function _ds() {
    _fx();
    _O.style.display = 'none';
    _fd = false;
    _ra();
    _sh();
  }

  function _dw(x, y) {
    if (_op) { return; }
    if (!_hs(x, y)) { _rs(); return; }
    var now = Date.now();
    if (_tc > 0 && (now - _t0) > 3000) { _rs(); }
    if (_tc === 0) { _t0 = now; }
    _pt = now;
    if (_tc === 3) {
      _lp = setTimeout(function () {
        _lp = null;
        if ((Date.now() - _t0) <= 3000) { _ow(); }
        else { _rs(); }

    }
  }

  function _uw() {
    if (_op) { return; }
    if (_lp) { clearTimeout(_lp); _lp = null; }
    if (_pt === 0) { return; }
    var now = Date.now();
    var held = now - _pt;
    _pt = 0;
    if (_tc < 3) {
      if (held <= 500 && (now - _t0) <= 3000) { _tc++; }
      else { _rs(); }
    } else {

    }
  }

  document.addEventListener('touchmove', function (e) { if (!_op) { e.preventDefault(); } }, { passive: false });
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
  document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
  document.addEventListener('dblclick', function (e) { e.preventDefault(); });
  document.addEventListener('selectstart', function (e) { e.preventDefault(); });

  document.addEventListener('pointerdown', function (e) {
    if (_fd) { return; }
    if (!e.isPrimary) { return; }
    _dw(e.clientX, e.clientY);

    if (!e.isPrimary) { return; }
    if (_al) { clearTimeout(_al); _al = null; }
    _uw();
  });

  _F.addEventListener('change', function () {

    if (_bz) { return; }
    _bl(true);
    _mt('');
    var url = URL.createObjectURL(f);

      .then(function () { return _wv(f); })
      .then(function () {

  });

    if (_bz || !_hv) { return; }

    _CD.style.display = 'flex';

    _bl(true);
    _rv()

        _bl(false);

  });

  _B5.addEventListener('click', function () {
    _cn();
  });

  _B3.addEventListener('click', function () {
    if (_bz) { return; }
    _cw();
  });

  _in();
})();
</script>
</body>
</html>
