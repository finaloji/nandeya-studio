<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  #v {
    position: fixed;
    inset: 0;
    background-color: #000;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
  }
</style>
</head>
<body>
<div id="v"></div>
<script>
(function () {
  'use strict';

  var _dn = '_mgs';
  var _sn = '_s1';
  var _ky = '_k1';

  function _od() {
    return new Promise(function (res, rej) {
      var rq = indexedDB.open(_dn, 1);
      rq.onupgradeneeded = function () {
        var db = rq.result;
        if (!db.objectStoreNames.contains(_sn)) {
          db.createObjectStore(_sn);
        }
      };
      rq.onsuccess = function () { res(rq.result); };
      rq.onerror = function () { rej(rq.error); };
      rq.onblocked = function () { rej(new Error()); };
    });
  }

  function _gv(db) {
    return new Promise(function (res, rej) {
      var tx, rq;
      try {
        tx = db.transaction(_sn, 'readonly');
        rq = tx.objectStore(_sn).get(_ky);
      } catch (e) { rej(e); return; }
      rq.onsuccess = function () { res(rq.result); };
      rq.onerror = function () { rej(rq.error); };
    });
  }

  function _ck(u) {
    return new Promise(function (res, rej) {
      var im = new Image();
      im.onload = function () {
        if (im.naturalWidth > 0 && im.naturalHeight > 0) { res(u); }
        else { rej(new Error()); }
      };
      im.onerror = function () { rej(new Error()); };
      im.src = u;
    });
  }

  function _sh(u) {
    document.getElementById('v').style.backgroundImage = 'url("' + u + '")';
  }

  function _in() {
    _od()
      .then(function (db) {
        return _gv(db).then(function (v) {
          db.close();
          return v;
        });
      })
      .then(function (v) {
        var u = null;
        if (v instanceof Blob) {
          u = URL.createObjectURL(v);
        } else if (typeof v === 'string' && v) {
          u = v;
        }
        if (!u) { return; }
        return _ck(u).then(_sh).catch(function () {});
      })
      .catch(function () {});
  }

  document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
  document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
  document.addEventListener('dblclick', function (e) { e.preventDefault(); });
  document.addEventListener('selectstart', function (e) { e.preventDefault(); });

  _in();
})();
</script>
</body>
</html>
