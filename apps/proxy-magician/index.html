<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<title>Magic Bar</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html {
    height: 100%;
    /* セーフエリア外に白帯が出ないよう最下層も黒にする */
    background: #050508;
  }

  body {
    height: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, #14142a 0%, #0a0a14 60%, #050508 100%);
    color: #e8e0cc;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* トランプケースの表示エリア（主役） */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
    padding: 24px;
  }

  .card-case {
    position: relative;
    width: min(48vw, 200px);
    aspect-ratio: 5 / 7;
    border-radius: 10px;
    background: linear-gradient(160deg, #2a1a3e 0%, #1a1030 45%, #120a22 100%);
    border: 1px solid rgba(212, 175, 55, 0.55);
    box-shadow:
      0 0 40px rgba(120, 80, 200, 0.25),
      0 0 90px rgba(120, 80, 200, 0.12),
      inset 0 0 24px rgba(0, 0, 0, 0.5);
    animation: breathe 5s ease-in-out infinite;
  }

  /* 呼吸のようなゆっくりした明滅 */
  @keyframes breathe {
    0%, 100% {
      box-shadow:
        0 0 40px rgba(120, 80, 200, 0.25),
        0 0 90px rgba(120, 80, 200, 0.12),
        inset 0 0 24px rgba(0, 0, 0, 0.5);
    }
    50% {
      box-shadow:
        0 0 55px rgba(120, 80, 200, 0.4),
        0 0 120px rgba(120, 80, 200, 0.2),
        inset 0 0 24px rgba(0, 0, 0, 0.5);
    }
  }

  /* ケースの二重枠 */
  .case-frame {
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(212, 175, 55, 0.35);
    border-radius: 6px;
    pointer-events: none;
  }

  /* ケースのフラップ（箱らしさの演出） */
  .case-flap {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 14%;
    border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0));
    border-radius: 10px 10px 0 0;
    pointer-events: none;
  }

  /* 中央のスペードマーク */
  .case-mark {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
  }

  .case-mark .suit {
    font-size: min(16vw, 64px);
    color: #d4af37;
    text-shadow: 0 0 18px rgba(212, 175, 55, 0.5);
    line-height: 1;
  }

  .case-mark .suit-row {
    display: flex;
    gap: 14px;
    font-size: min(4.5vw, 18px);
    color: rgba(212, 175, 55, 0.55);
    letter-spacing: 2px;
  }

  /* コーナーの飾り */
  .case-corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: rgba(212, 175, 55, 0.5);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .case-corner.tl { top: 14px; left: 14px; border-top-width: 1px; border-left-width: 1px; }
  .case-corner.tr { top: 14px; right: 14px; border-top-width: 1px; border-right-width: 1px; }
  .case-corner.bl { bottom: 14px; left: 14px; border-bottom-width: 1px; border-left-width: 1px; }
  .case-corner.br { bottom: 14px; right: 14px; border-bottom-width: 1px; border-right-width: 1px; }

  /* スリープ中ステータス */
  .status {
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: rgba(180, 160, 220, 0.75);
    padding: 0 24px 36px;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.95; }
  }

  /* ボタンエリア */
  .btn-wrap {
    width: 100%;
    padding: 0 32px;
    padding-bottom: calc(28px + env(safe-area-inset-bottom));
  }

  .btn-start {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
    padding: 18px 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.3em;
    font-family: inherit;
    color: #d4af37;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.5);
    border-radius: 14px;
    cursor: pointer;
  }

  .btn-start:active {
    background: rgba(212, 175, 55, 0.2);
  }

  /* STARTED状態: ステータスとボタンを隠す */
  body.started .status,
  body.started .btn-wrap {
    display: none;
  }

  /* 起動直後〜発話中: 光が一段強くなり、速い周期で滑らかに脈動 */
  body.speaking .card-case {
    animation: awake-pulse 1.6s ease-in-out infinite;
  }

  @keyframes awake-pulse {
    0%, 100% {
      box-shadow:
        0 0 55px rgba(140, 95, 220, 0.45),
        0 0 120px rgba(140, 95, 220, 0.22),
        inset 0 0 24px rgba(0, 0, 0, 0.5);
    }
    50% {
      box-shadow:
        0 0 75px rgba(150, 105, 235, 0.6),
        0 0 160px rgba(150, 105, 235, 0.32),
        inset 0 0 24px rgba(0, 0, 0, 0.45);
    }
  }

  /* 発話中はスペードマークの輝きも増す */
  body.speaking .case-mark .suit {
    text-shadow: 0 0 26px rgba(212, 175, 55, 0.85);
  }

  /* WAITING状態: 脈動が収まり、IDLEよりやや明るい静的な光 */
  body.waiting .card-case {
    animation: none;
    box-shadow:
      0 0 50px rgba(130, 90, 210, 0.35),
      0 0 110px rgba(130, 90, 210, 0.18),
      inset 0 0 24px rgba(0, 0, 0, 0.5);
  }

  /* 開始済み表示（初期は非表示） */
  .booting {
    display: none;
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(180, 160, 220, 0.6);
    padding: 0 24px calc(64px + env(safe-area-inset-bottom));
    animation: pulse 3s ease-in-out infinite;
  }

  /* 「…」は発話終了後のWAITINGでのみ表示 */
  body.waiting .booting {
    display: block;
  }
</style>
</head>
<body>

  <!-- トランプケース（主役） -->
  <div class="stage">
    <div class="card-case">
      <div class="case-flap"></div>
      <div class="case-frame"></div>
      <div class="case-corner tl"></div>
      <div class="case-corner tr"></div>
      <div class="case-corner bl"></div>
      <div class="case-corner br"></div>
      <div class="case-mark">
        <div class="suit">&#9824;</div>
        <div class="suit-row">
          <span>&#9829;</span><span>&#9827;</span><span>&#9830;</span>
        </div>
      </div>
    </div>
  </div>

  <!-- スリープ中ステータス -->
  <div class="status">AI MAGICIAN &mdash; SLEEPING</div>

  <!-- 開始済み表示 -->
  <div class="booting">&hellip;</div>

  <!-- スタートボタン -->
  <div class="btn-wrap">
    <button class="btn-start" type="button">START</button>
  </div>

<script>
  // 状態: 0=IDLE(待機), 1=SPEAKING(INTRO発話中), 2=WAITING(発話終了後の待機)
  var phase = 0;

  var startBtn = document.querySelector('.btn-start');

  // INTRO台本（文単位で順に発話する。将来のペルソナ差し替えを見据えて1か所に集約）
  var introLines = [
    '初めまして。代理のマジシャンです。',
    '担当は、人類的な事情で離席中。',
    '私が、代わりを務めます。'
  ];

  var SENTENCE_PAUSE_MS = 600;   // 文間ポーズ
  var START_DELAY_MS = 800;      // START押下から発話開始までの溜め
  var SPEAK_TIMEOUT_MS = 18000;  // 発話が進まない場合の保険タイムアウト

  var speakTimeoutId = 0;

  // 再読み込み後に前回の音声が残らないようにする
  if (window.speechSynthesis) {
    speechSynthesis.cancel();
    window.addEventListener('pagehide', function() {
      speechSynthesis.cancel();
    });
  }

  // 日本語音声を優先して選択（Siriの声があれば最優先。無ければnullを返し、lang指定のみでデフォルトに任せる）
  function pickJaVoice() {
    var voices = speechSynthesis.getVoices();
    var jaVoices = [];
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang && voices[i].lang.indexOf('ja') === 0) jaVoices.push(voices[i]);
    }
    for (var j = 0; j < jaVoices.length; j++) {
      if (jaVoices[j].name && jaVoices[j].name.indexOf('Siri') !== -1) return jaVoices[j];
    }
    return jaVoices.length > 0 ? jaVoices[0] : null;
  }

  // WAITINGへの遷移（onend完走とタイムアウトの競合に備え、1回だけ実行）
  function toWaiting() {
    if (phase !== 1) return;
    phase = 2;
    clearTimeout(speakTimeoutId);
    // タイムアウト経由の場合に詰まった発話が後から鳴らないよう止める
    if (window.speechSynthesis) speechSynthesis.cancel();
    document.body.classList.remove('speaking');
    document.body.classList.add('waiting');
  }

  // INTROを文単位で順に発話する
  function speakIntro() {
    if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) {
      // 音声合成が使えない環境でも視覚遷移は最後まで進める
      toWaiting();
      return;
    }

    var index = 0;

    function speakNext() {
      if (phase !== 1) return;
      if (index >= introLines.length) {
        toWaiting();
        return;
      }
      var u = new SpeechSynthesisUtterance(introLines[index]);
      index++;
      u.lang = 'ja-JP';
      var voice = pickJaVoice();
      if (voice) u.voice = voice;
      u.rate = 0.9;   // 話速: 標準よりわずかに遅め
      u.pitch = 0.9;  // 抑揚: やや平坦・無機質寄り
      // ※音量はデバイスのメディア音量に従う。マナーモード・音量ゼロの検知は行わない
      u.onend = function() {
        setTimeout(speakNext, SENTENCE_PAUSE_MS);
      };
      u.onerror = function() {
        // エラーでも止まらず次の文へ進む
        setTimeout(speakNext, SENTENCE_PAUSE_MS);
      };
      speechSynthesis.speak(u);
      // iOSで発話キューが詰まる既知事象への保険
      speechSynthesis.resume();
    }

    // ※ getVoices() は非同期ロードのため空のことがある。
    //   各文の発話時に pickJaVoice() で選び直すので、ロード後の文から日本語音声が反映される。
    //   見つからない間も u.lang='ja-JP' でデフォルト音声に任せて発話は進める
    speakNext();
  }

  // スタートボタン押下（連打は最初の1回のみ有効）
  function onStart() {
    if (phase !== 0) return;
    phase = 1;
    document.body.classList.add('started');
    document.body.classList.add('speaking');

    // iOSはユーザー操作起点でないと発話しないため、
    // クリックハンドラ内で無音の短い発話を同期発火して"解錠"しておく
    if (window.speechSynthesis && window.SpeechSynthesisUtterance) {
      var unlock = new SpeechSynthesisUtterance(' ');
      unlock.volume = 0;
      speechSynthesis.speak(unlock);
    }

    // 発話が始まらない・途中で止まる場合の保険（正常終了すれば発動しない）
    speakTimeoutId = setTimeout(toWaiting, SPEAK_TIMEOUT_MS);

    // 短い溜めを置いてから発話開始
    setTimeout(speakIntro, START_DELAY_MS);
  }

  startBtn.addEventListener('click', onStart);

  // ダブルタップ・ピンチによる拡大を抑止
  document.addEventListener('gesturestart', function(e) {
    e.preventDefault();
  });
  var lastTouch = 0;
  document.addEventListener('touchend', function(e) {
    var now = Date.now();
    if (now - lastTouch < 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
</script>
</body>
</html>
