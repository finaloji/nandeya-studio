<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="時計">
<title>時計</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* 画面外（オーバースクロール領域）まで壁紙の下端色で塗り、下の空白を防ぐ */
  html {
    background-color: #55b4e6;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    color: #ffffff;
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    touch-action: manipulation;
  }

  /* iOS標準の水色グラデーション壁紙（近似）。
     画面全体を固定で覆い、Safariのバー開閉でも空白ができないようにする */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(180deg,
      #9fddf3 0%,
      #86cfef 35%,
      #67bdea 70%,
      #55b4e6 100%);
  }

  /* 日付＋時計のかたまり */
  .head {
    position: absolute;
    top: 16%;
    left: 0;
    right: 0;
    text-align: center;
  }
  .date {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 2px;
  }
  .clock {
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif;
    font-size: 25vw;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -3px;
    color: rgba(255, 255, 255, 0.6);
  }

  /* 下部のライト・カメラボタン（ロック画面の飾り） */
  .foot {
    position: absolute;
    left: 0;
    right: 0;
    bottom: env(safe-area-inset-bottom, 8px);
    display: flex;
    justify-content: space-between;
    padding: 0 46px;
  }
  .fbtn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    /* フチの明るいリング＋上側のハイライトでガラスの浮き感を出す */
    border: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: inset 0 1px 1.5px rgba(255, 255, 255, 0.45),
                inset 0 -1px 2px rgba(255, 255, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fbtn svg { display: block; }

  /* タップ案内（許可取得前のみ表示・控えめ） */
  .hint {
    position: absolute;
    left: 0;
    right: 0;
    top: 54%;
    text-align: center;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    transition: opacity 0.5s;
    pointer-events: none;
  }
  .hint.off { opacity: 0; }

  /* 開発用センサー表示（一時的。2-1/2-2の検証後に削除） */
  .dbg {
    position: absolute;
    left: 0;
    right: 0;
    bottom: calc(env(safe-area-inset-bottom, 8px) + 78px);
    text-align: center;
    font-size: 11px;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.5);
    font-family: ui-monospace, monospace;
    pointer-events: none;
  }
</style>
</head>
<body>

  <!-- 日付＋時計 -->
  <div class="head">
    <div class="date" id="_d">--</div>
    <div class="clock" id="_c">--:--</div>
  </div>

  <!-- 下部ボタン -->
  <div class="foot">
    <div class="fbtn">
      <svg width="25" height="25" viewBox="0 0 24 24">
        <!-- ヘッド（反射鏡のフタ） -->
        <rect x="7.3" y="3.9" width="9.4" height="2.6" rx="1.1" fill="#fff"/>
        <!-- 本体（下ほど広がる形・中央のスイッチをカプセル状にくり抜き） -->
        <path fill="#fff" fill-rule="evenodd" clip-rule="evenodd" d="M9.6 6.6H14.4L15.6 18.4a1.4 1.4 0 0 1-1.4 1.4H9.8a1.4 1.4 0 0 1-1.4-1.4L9.6 6.6Zm2.4 3a1.3 1.3 0 0 0-1.3 1.3v3a1.3 1.3 0 0 0 2.6 0v-3a1.3 1.3 0 0 0-1.3-1.3z"/>
        <!-- スイッチのつまみ -->
        <circle cx="12" cy="13.4" r="0.95" fill="#fff"/>
      </svg>
    </div>
    <div class="fbtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
        <path d="M9.2 3.5l-1.1 1.6H4.5A2.5 2.5 0 0 0 2 7.6v10A2.5 2.5 0 0 0 4.5 20h15a2.5 2.5 0 0 0 2.5-2.5v-10a2.5 2.5 0 0 0-2.5-2.5h-3.6l-1.1-1.6a1 1 0 0 0-.83-.44H10.03a1 1 0 0 0-.83.44zM12 8.2a4.3 4.3 0 1 1 0 8.6 4.3 4.3 0 0 1 0-8.6zm0 1.9a2.4 2.4 0 1 0 0 4.8 2.4 2.4 0 0 0 0-4.8z"/>
      </svg>
    </div>
  </div>

  <!-- タップ案内 -->
  <div class="hint" id="_h">画面をタップ</div>

  <!-- 開発用センサー表示（一時的） -->
  <div class="dbg" id="_g"></div>

<script>
  (function () {
    'use strict';

    var _c = document.getElementById('_c');
    var _d = document.getElementById('_d');
    var _wd = ['日', '月', '火', '水', '木', '金', '土'];

    // 表示する時刻の基準を返す（試作1-1では実時刻をそのまま返す）
    // 後続スプリントで、この関数がプリセット表示・巻き戻し中の時刻を返すようになる
    function _base() {
      return new Date();
    }

    function _z(n) {
      return (n < 10 ? '0' : '') + n;
    }

    function _tick() {
      var t = _base();
      _c.textContent = _z(t.getHours()) + ':' + _z(t.getMinutes());
      _d.textContent = (t.getMonth() + 1) + '月' + t.getDate() + '日 (' + _wd[t.getDay()] + ')';
    }

    _tick();
    setInterval(_tick, 250);

    // ------------------------------------------------------------
    // 数値補正センサー（DeviceMotion）の許可取得と購読
    // ------------------------------------------------------------
    var _h = document.getElementById('_h');   // タップ案内
    var _g = document.getElementById('_g');    // 開発用表示
    var _on = false;                           // 購読済みフラグ

    function _fx(v) {
      return (v == null) ? '-' : v.toFixed(1);
    }

    // 伏せ/表向きのしきい値（実測: 表向き z≈-9.9 / 伏せ z≈+9.7）
    var _FD = 6;      // これより大きければ伏せ
    var _FU = -6;     // これより小さければ表向き
    var _HOLD = 800;  // 伏せをこの時間キープで待機モードへ(ms)

    var _st = 'up';           // up=通常(表向き) / wait=待機モード
    var _dwn = 0;             // 伏せを検出し始めた時刻
    var _flU = 0;             // 開発用フラッシュ表示の終了時刻
    var _flT = '';            // 開発用フラッシュ表示の文言

    function _lab() {
      return (_st === 'wait') ? '待機' : '表';
    }

    // センサー1回分の受信
    function _rm(e) {
      var a = e.accelerationIncludingGravity || {};
      var r = e.rotationRate || {};
      var z = (a.z == null) ? 0 : a.z;
      var now = Date.now();

      // --- 伏せ/表向きの状態遷移 ---
      var o = (z > _FD) ? 'D' : (z < _FU ? 'U' : 'M');
      if (_st === 'up') {
        if (o === 'D') {
          if (_dwn === 0) {
            _dwn = now;
          } else if (now - _dwn >= _HOLD) {
            _st = 'wait';
            _dwn = 0;
            if (navigator.vibrate) navigator.vibrate(60); // 待機入りの合図(開発用)
          }
        } else {
          _dwn = 0;
        }
      } else if (_st === 'wait') {
        if (o === 'U') {
          _st = 'up';
          _flT = '★表向き検出';
          _flU = now + 1500;
        }
      }

      // --- 開発用表示 ---
      var head = (now < _flU) ? _flT : _lab();
      _g.textContent = head +
        '  z:' + _fx(z) +
        '  β:' + _fx(r.beta) +
        '  γ:' + _fx(r.gamma);
    }

    // 購読開始（案内を消す）
    function _bind() {
      if (_on) return;
      _on = true;
      window.addEventListener('devicemotion', _rm);
      _h.classList.add('off');
    }

    // タップで許可要求（iOS 13+ はユーザー操作からの呼び出しが必須）
    function _ask() {
      var DM = window.DeviceMotionEvent;
      if (DM && typeof DM.requestPermission === 'function') {
        DM.requestPermission().then(function (res) {
          if (res === 'granted') {
            _bind();
          } else {
            _h.textContent = 'センサー無効';
          }
        }).catch(function () {
          _h.textContent = 'センサー無効';
        });
      } else {
        // 非iOS / 許可不要な環境
        _bind();
      }
    }

    document.addEventListener('click', _ask);
  })();
</script>
</body>
</html>
