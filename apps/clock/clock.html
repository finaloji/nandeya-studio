<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="時計">
<title>時計</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* 画面外（オーバースクロール領域）まで壁紙の下端色で塗り、下の空白を防ぐ */
  html {
    background-color: #55b4e6;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    color: #ffffff;
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    touch-action: manipulation;
  }

  /* iOS標準の水色グラデーション壁紙（近似）。
     画面全体を固定で覆い、Safariのバー開閉でも空白ができないようにする */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(180deg,
      #9fddf3 0%,
      #86cfef 35%,
      #67bdea 70%,
      #55b4e6 100%);
  }

  /* 日付＋時計のかたまり */
  .head {
    position: absolute;
    top: 16%;
    left: 0;
    right: 0;
    text-align: center;
  }
  .date {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 2px;
  }
  .clock {
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif;
    font-size: 25vw;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -3px;
    color: rgba(255, 255, 255, 0.6);
  }

  /* 下部のライト・カメラボタン（ロック画面の飾り） */
  .foot {
    position: absolute;
    left: 0;
    right: 0;
    bottom: env(safe-area-inset-bottom, 8px);
    display: flex;
    justify-content: space-between;
    padding: 0 46px;
  }
  .fbtn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    /* フチの明るいリング＋上側のハイライトでガラスの浮き感を出す */
    border: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: inset 0 1px 1.5px rgba(255, 255, 255, 0.45),
                inset 0 -1px 2px rgba(255, 255, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fbtn svg { display: block; }

  /* タップ案内（許可取得前のみ表示・控えめ） */
  .hint {
    position: absolute;
    left: 0;
    right: 0;
    top: 54%;
    text-align: center;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    transition: opacity 0.5s;
    pointer-events: none;
  }
  .hint.off { opacity: 0; }

  /* 開発用センサー表示（一時的。2-1/2-2の検証後に削除） */
  .dbg {
    position: absolute;
    left: 0;
    right: 0;
    bottom: calc(env(safe-area-inset-bottom, 8px) + 78px);
    text-align: center;
    font-size: 11px;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.5);
    font-family: ui-monospace, monospace;
    pointer-events: none;
  }
</style>
</head>
<body>

  <!-- 日付＋時計 -->
  <div class="head">
    <div class="date" id="_d">--</div>
    <div class="clock" id="_c">--:--</div>
  </div>

  <!-- 下部ボタン -->
  <div class="foot">
    <div class="fbtn">
      <svg width="25" height="25" viewBox="0 0 24 24">
        <!-- ヘッド（反射鏡のフタ） -->
        <rect x="7.3" y="3.9" width="9.4" height="2.6" rx="1.1" fill="#fff"/>
        <!-- 本体（下ほど広がる形・中央のスイッチをカプセル状にくり抜き） -->
        <path fill="#fff" fill-rule="evenodd" clip-rule="evenodd" d="M9.6 6.6H14.4L15.6 18.4a1.4 1.4 0 0 1-1.4 1.4H9.8a1.4 1.4 0 0 1-1.4-1.4L9.6 6.6Zm2.4 3a1.3 1.3 0 0 0-1.3 1.3v3a1.3 1.3 0 0 0 2.6 0v-3a1.3 1.3 0 0 0-1.3-1.3z"/>
        <!-- スイッチのつまみ -->
        <circle cx="12" cy="13.4" r="0.95" fill="#fff"/>
      </svg>
    </div>
    <div class="fbtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
        <path d="M9.2 3.5l-1.1 1.6H4.5A2.5 2.5 0 0 0 2 7.6v10A2.5 2.5 0 0 0 4.5 20h15a2.5 2.5 0 0 0 2.5-2.5v-10a2.5 2.5 0 0 0-2.5-2.5h-3.6l-1.1-1.6a1 1 0 0 0-.83-.44H10.03a1 1 0 0 0-.83.44zM12 8.2a4.3 4.3 0 1 1 0 8.6 4.3 4.3 0 0 1 0-8.6zm0 1.9a2.4 2.4 0 1 0 0 4.8 2.4 2.4 0 0 0 0-4.8z"/>
      </svg>
    </div>
  </div>

  <!-- タップ案内 -->
  <div class="hint" id="_h">画面をタップ</div>

  <!-- 開発用センサー表示（一時的） -->
  <div class="dbg" id="_g"></div>

<script>
  (function () {
    'use strict';

    var _c = document.getElementById('_c');
    var _d = document.getElementById('_d');
    var _wd = ['日', '月', '火', '水', '木', '金', '土'];

    // 方向 → 補正する分数（初期値。後で設定画面から変更可にする）
    var _dmap = { '手前': 3, '右': 6, '奥': 9, '左': 12 };

    // 表示時刻の上書き値。null なら実時刻、Date が入ればその時刻で固定表示
    var _ov = null;

    // 補正表示のタイミング設定
    var _RW_WAIT = 2000;  // 固定表示から巻き戻し開始までの待ち(ms)
    var _RW_STEP = 500;   // 巻き戻し1ステップの間隔(ms)
    var _rwT = null;      // 開始待ちタイマー
    var _rwI = null;      // ステップ用インターバル

    // 補正表示を中止して実時刻に戻す
    function _rwStop() {
      if (_rwT) { clearTimeout(_rwT); _rwT = null; }
      if (_rwI) { clearInterval(_rwI); _rwI = null; }
      _ov = null;
      _tick();
    }

    // 現在時刻＋min分で固定表示し、2秒後から1分ずつ実時刻まで巻き戻す
    function _rwGo(min) {
      _rwStop();
      _ov = new Date(Date.now() + min * 60000);
      _tick();
      _rwT = setTimeout(function () {
        _rwT = null;
        _rwI = setInterval(function () {
          _ov = new Date(_ov.getTime() - 60000);
          if (_ov.getTime() <= Date.now()) {   // 実時刻に到達したら通常へ
            _rwStop();
            return;
          }
          _tick();
        }, _RW_STEP);
      }, _RW_WAIT);
    }

    // 表示する時刻の基準を返す
    function _base() {
      return _ov ? _ov : new Date();
    }

    function _z(n) {
      return (n < 10 ? '0' : '') + n;
    }

    function _tick() {
      var t = _base();
      _c.textContent = _z(t.getHours()) + ':' + _z(t.getMinutes());
      _d.textContent = (t.getMonth() + 1) + '月' + t.getDate() + '日 (' + _wd[t.getDay()] + ')';
    }

    _tick();
    setInterval(_tick, 250);

    // ------------------------------------------------------------
    // 数値補正センサー（DeviceMotion）の許可取得と購読
    // ------------------------------------------------------------
    var _h = document.getElementById('_h');   // タップ案内
    var _g = document.getElementById('_g');    // 開発用表示
    var _on = false;                           // 購読済みフラグ
    var _VER = 'v5';                           // ビルド確認用（更新のたびに上げる）
    _g.textContent = _VER + ' 準備中';

    function _fx(v) {
      return (v == null) ? '-' : v.toFixed(1);
    }

    // 伏せ/表向きのしきい値（実測: 表向き z≈-9.9 / 伏せ z≈+9.7）
    var _FD = 6;      // これより大きければ伏せ
    var _FU = -6;     // これより小さければ表向き
    var _HOLD = 800;  // 伏せをこの時間キープで待機モードへ(ms)

    var _st = 'up';           // up=通常(表向き) / wait=待機 / flip=返し中
    var _dwn = 0;             // 伏せを検出し始めた時刻
    var _lt = 0;              // 前回イベント時刻(積分用)
    var _ib = 0;              // 返し中のβ回転の積算(度)
    var _ig = 0;              // 返し中のγ回転の積算(度)
    var _ia = 0;              // 返し中のα回転の積算(度)
    var _flU = 0;             // 開発用フラッシュ表示の終了時刻
    var _flT = '';            // 開発用フラッシュ表示の文言

    function _lab() {
      if (_st === 'wait') return '待機';
      if (_st === 'flip') return '返し中';
      return '表';
    }

    // 積算した回転から返した方向を判定する（実測で確定）
    // 手前/奥 = α軸, 右/左 = β軸
    function _dir(ia, ib) {
      if (Math.abs(ia) >= Math.abs(ib)) {
        return ia < 0 ? '手前' : '奥';   // α: 手前=マイナス / 奥=プラス
      }
      return ib > 0 ? '右' : '左';        // β: 右=プラス / 左=マイナス
    }

    // センサー1回分の受信
    function _rm(e) {
      var a = e.accelerationIncludingGravity || {};
      var r = e.rotationRate || {};
      var z = (a.z == null) ? 0 : a.z;
      var rb = (r.beta == null) ? 0 : r.beta;
      var rg = (r.gamma == null) ? 0 : r.gamma;
      var ra = (r.alpha == null) ? 0 : r.alpha;
      var now = Date.now();
      var dt = _lt ? (now - _lt) / 1000 : 0;
      _lt = now;

      // 端末の向き: D=伏せ / U=表向き / M=その中間(返している最中)
      var o = (z > _FD) ? 'D' : (z < _FU ? 'U' : 'M');

      if (_st === 'up') {
        if (o === 'D') {
          if (_dwn === 0) _dwn = now;
          else if (now - _dwn >= _HOLD) { _st = 'wait'; _dwn = 0; }
        } else {
          _dwn = 0;
        }
      } else if (_st === 'wait') {
        if (o !== 'D') {                 // 伏せから動き出した＝返し開始
          _st = 'flip';
          _ib = rb * dt;
          _ig = rg * dt;
          _ia = ra * dt;
        }
      } else if (_st === 'flip') {
        _ib += rb * dt;                  // 返し中は回転を積算し続ける
        _ig += rg * dt;
        _ia += ra * dt;
        if (o === 'U') {                 // 表向きに到達＝返し完了、方向を確定
          var dir = _dir(_ia, _ib);
          var min = _dmap[dir] || 0;
          // 現在時刻＋補正分数で固定表示→2秒後に1分ずつ実時刻まで巻き戻し
          if (min > 0) {
            _rwGo(min);
          }
          _flT = '★' + dir + '(+' + min + ')  α=' + _ia.toFixed(0) + ' β=' + _ib.toFixed(0);
          _flU = now + 3000;
          _st = 'up';
        } else if (o === 'D') {          // 伏せに戻った＝やり直し
          _st = 'wait';
        }
      }

      // --- 開発用表示 ---
      var head = (now < _flU) ? _flT : _lab();
      _g.textContent = _VER + ' ' + head +
        '  z:' + _fx(z) +
        '  β:' + _fx(rb) +
        '  γ:' + _fx(rg);
    }

    // 購読開始（案内を消す）
    function _bind() {
      if (_on) return;
      _on = true;
      window.addEventListener('devicemotion', _rm);
      _h.classList.add('off');
    }

    // タップで許可要求（iOS 13+ はユーザー操作からの呼び出しが必須）
    function _ask() {
      var DM = window.DeviceMotionEvent;
      if (DM && typeof DM.requestPermission === 'function') {
        DM.requestPermission().then(function (res) {
          if (res === 'granted') {
            _bind();
          } else {
            _h.textContent = 'センサー無効';
          }
        }).catch(function () {
          _h.textContent = 'センサー無効';
        });
      } else {
        // 非iOS / 許可不要な環境
        _bind();
      }
    }

    document.addEventListener('click', _ask);
  })();
</script>
</body>
</html>
