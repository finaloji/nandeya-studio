<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="時計">
<title>時計</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    color: #ffffff;
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    touch-action: manipulation;
  }

  /* iOS標準の水色グラデーション壁紙（近似）。
     画面全体を固定で覆い、Safariのバー開閉でも空白ができないようにする */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(180deg,
      #9fddf3 0%,
      #86cfef 35%,
      #67bdea 70%,
      #55b4e6 100%);
  }

  /* 日付＋時計のかたまり */
  .head {
    position: absolute;
    top: 16%;
    left: 0;
    right: 0;
    text-align: center;
  }
  .date {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: 2px;
  }
  .clock {
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif;
    font-size: 25vw;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -3px;
    color: rgba(255, 255, 255, 0.6);
  }

  /* 下部のライト・カメラボタン（ロック画面の飾り） */
  .foot {
    position: absolute;
    left: 0;
    right: 0;
    bottom: calc(env(safe-area-inset-bottom, 20px) + 22px);
    display: flex;
    justify-content: space-between;
    padding: 0 46px;
  }
  .fbtn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fbtn svg { display: block; }

  /* ホームインジケータ */
  .home-ind {
    position: absolute;
    bottom: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 135px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.85);
  }
</style>
</head>
<body>

  <!-- 日付＋時計 -->
  <div class="head">
    <div class="date" id="_d">--</div>
    <div class="clock" id="_c">--:--</div>
  </div>

  <!-- 下部ボタン -->
  <div class="foot">
    <div class="fbtn">
      <svg width="22" height="22" viewBox="0 0 24 24">
        <!-- ヘッド（反射鏡） -->
        <path d="M8.6 3.2h6.8a.8.8 0 0 1 .78.98l-.5 2.1a1 1 0 0 1-.97.78h-5.2a1 1 0 0 1-.97-.78l-.5-2.1a.8.8 0 0 1 .78-.98z" fill="#fff"/>
        <!-- 本体 -->
        <path d="M9.5 7.9h5a.9.9 0 0 1 .9.96l-.45 9.4a1.4 1.4 0 0 1-1.4 1.33h-1.6a1.4 1.4 0 0 1-1.4-1.33l-.45-9.4a.9.9 0 0 1 .9-.96z" fill="#fff"/>
        <!-- スイッチ -->
        <rect x="10.9" y="10.3" width="2.2" height="1" rx="0.5" fill="#67bdea"/>
      </svg>
    </div>
    <div class="fbtn">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="#fff">
        <path d="M9.2 3.5l-1.1 1.6H4.5A2.5 2.5 0 0 0 2 7.6v10A2.5 2.5 0 0 0 4.5 20h15a2.5 2.5 0 0 0 2.5-2.5v-10a2.5 2.5 0 0 0-2.5-2.5h-3.6l-1.1-1.6a1 1 0 0 0-.83-.44H10.03a1 1 0 0 0-.83.44zM12 8.2a4.3 4.3 0 1 1 0 8.6 4.3 4.3 0 0 1 0-8.6zm0 1.9a2.4 2.4 0 1 0 0 4.8 2.4 2.4 0 0 0 0-4.8z"/>
      </svg>
    </div>
  </div>

  <div class="home-ind"></div>

<script>
  (function () {
    'use strict';

    var _c = document.getElementById('_c');
    var _d = document.getElementById('_d');
    var _wd = ['日', '月', '火', '水', '木', '金', '土'];

    // 表示する時刻の基準を返す（試作1-1では実時刻をそのまま返す）
    // 後続スプリントで、この関数がプリセット表示・巻き戻し中の時刻を返すようになる
    function _base() {
      return new Date();
    }

    function _z(n) {
      return (n < 10 ? '0' : '') + n;
    }

    function _tick() {
      var t = _base();
      _c.textContent = _z(t.getHours()) + ':' + _z(t.getMinutes());
      _d.textContent = (t.getMonth() + 1) + '月' + t.getDate() + '日 (' + _wd[t.getDay()] + ')';
    }

    _tick();
    setInterval(_tick, 250);
  })();
</script>
</body>
</html>
