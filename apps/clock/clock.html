<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* 画面外（オーバースクロール領域）まで壁紙の下端色で塗り、下の空白を防ぐ */
  html {
    background-color: #55b4e6;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    color: #ffffff;
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    touch-action: manipulation;
  }

  /* 壁紙レイヤー。画面全体を固定で覆い、差し替え可能にする。
     既定はiOS標準の水色グラデーション（近似）。設定で画像やプリセットに変更できる */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-color: transparent;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    background-image: linear-gradient(180deg,
      #9fddf3 0%,
      #86cfef 35%,
      #67bdea 70%,
      #55b4e6 100%);
  }

  /* 日付＋時計のかたまり */
  .head {
    position: absolute;
    top: 12%;
    left: 0;
    right: 0;
    text-align: center;
  }
  .date {
    font-family: var(--fcf, ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--fccol, rgba(255, 255, 255, 0.6));
    margin-bottom: 2px;
  }
  .clock {
    font-family: var(--fcf, ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif);
    font-size: 25vw;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -3px;
    color: var(--fccol, rgba(255, 255, 255, 0.6));
  }

  /* 下部のライト・カメラボタン（ロック画面の飾り） */
  .foot {
    position: absolute;
    left: 0;
    right: 0;
    bottom: env(safe-area-inset-bottom, 8px);
    display: flex;
    justify-content: space-between;
    padding: 0 46px;
  }
  .fbtn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    /* フチの明るいリング＋上側のハイライトでガラスの浮き感を出す */
    border: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: inset 0 1px 1.5px rgba(255, 255, 255, 0.45),
                inset 0 -1px 2px rgba(255, 255, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fbtn svg { display: block; }

  /* 表示設定パネル（隠し：カメラ3回タップで開く） */
  .sp {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0, 0, 0, 0.5);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Hiragino Sans", system-ui, sans-serif;
  }
  .sp.on { display: flex; }
  .sp-panel {
    width: 86%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    background: #1c1c1e;
    color: #fff;
    border-radius: 16px;
    padding: 20px;

  }

  .sp-row {

  /* ライセンス確認画面（初回セットアップ時のみ・以降は端末に記憶） */

  .lg-dc a { color: #0a84ff; text-decoration: none; }
</style>

<body>

  <!-- 下部ボタン -->

    <div class="fbtn" id="_lb">
      <svg width="25" height="25" viewBox="0 0 24 24">
        <!-- ヘッド（反射鏡のフタ） -->
        <rect x="7.3" y="3.9" width="9.4" height="2.6" rx="1.1" fill="#fff"/>
        <!-- 本体（下ほど広がる形・中央のスイッチをカプセル状にくり抜き） -->

<script>
  (function () {
    'use strict';

    var _c = document.getElementById('_c');
    var _d = document.getElementById('_d');
    var _wd = ['日', '月', '火', '水', '木', '金', '土'];

    // 方向 → 補正する分数（初期値。後で設定画面から変更可にする）
    var _dmap = { '手前': 3, '右': 6, '奥': 9, '左': 12 };

    // 表示時刻の上書き値。null なら実時刻、Date が入ればその時刻で固定表示
    var _ov = null;

    // 補正表示のタイミング設定
    var _RW_WAIT = 2000;  // 固定表示から巻き戻し開始までの待ち(ms)
    var _RW_STEP = 500;   // 巻き戻し1ステップの間隔(ms)
    var _rwT = null;      // 開始待ちタイマー
    var _rwI = null;      // ステップ用インターバル

    // 補正表示を中止して実時刻に戻す
    function _rwStop() {
      if (_rwT) { clearTimeout(_rwT); _rwT = null; }
      if (_rwI) { clearInterval(_rwI); _rwI = null; }
      _ov = null;
      _tick();
    }

    // 現在時刻＋min分で固定表示し、2秒後から1分ずつ実時刻まで巻き戻す
    function _rwGo(min) {
      _rwStop();
      _ov = new Date(Date.now() + min * 60000);
      _tick();
      _rwT = setTimeout(function () {
        _rwT = null;
        _rwI = setInterval(function () {
          _ov = new Date(_ov.getTime() - 60000);
          if (_ov.getTime() <= Date.now()) {   // 実時刻に到達したら通常へ
            _rwStop();
            return;
          }
          _tick();
        }, _RW_STEP);
      }, _RW_WAIT);
    }

    // 表示する時刻の基準を返す
    function _base() {
      return _ov ? _ov : new Date();
    }

    function _z(n) {
      return (n < 10 ? '0' : '') + n;
    }

    function _tick() {
      var t = _base();
      _c.textContent = _z(t.getHours()) + ':' + _z(t.getMinutes());
      _d.textContent = (t.getMonth() + 1) + '月' + t.getDate() + '日 (' + _wd[t.getDay()] + ')';
    }

    _tick();
    setInterval(_tick, 250);

    // ------------------------------------------------------------
    // 数値補正センサー（DeviceMotion）の許可取得と購読
    // ------------------------------------------------------------
    var _lb = document.getElementById('_lb');  // ライト(左下)
    var _cb = document.getElementById('_cb');  // カメラ(右下)
    var _sp = document.getElementById('_sp');  // 設定パネル
    var _sx = document.getElementById('_sx');  // 設定を閉じる
    var _on = false;                           // 購読済みフラグ
    var _VER = 'v27';                          // ビルド確認用（更新のたびに上げる）

    // 伏せ/表向きのしきい値（実測: 表向き z≈-9.9 / 伏せ z≈+9.7）
    var _FD = 6;      // これより大きければ伏せ
    var _FU = -6;     // これより小さければ表向き
    var _HOLD = 800;  // 伏せをこの時間キープで待機モードへ(ms)

    var _st = 'up';           // up=通常(表向き) / wait=待機 / flip=返し中
    var _dwn = 0;             // 伏せを検出し始めた時刻
    var _lt = 0;              // 前回イベント時刻(積分用)
    var _ib = 0;              // 返し中のβ回転の積算(度)
    var _ig = 0;              // 返し中のγ回転の積算(度)
    var _ia = 0;              // 返し中のα回転の積算(度)

    // 積算した回転から返した方向を判定する（実測で確定）
    // 手前/奥 = α軸, 右/左 = β軸
    function _dir(ia, ib) {
      if (Math.abs(ia) >= Math.abs(ib)) {
        return ia < 0 ? '手前' : '奥';   // α: 手前=マイナス / 奥=プラス
      }
      return ib > 0 ? '右' : '左';        // β: 右=プラス / 左=マイナス
    }

    // センサー1回分の受信
    function _rm(e) {
      var a = e.accelerationIncludingGravity || {};
      var r = e.rotationRate || {};
      var z = (a.z == null) ? 0 : a.z;
      var rb = (r.beta == null) ? 0 : r.beta;
      var rg = (r.gamma == null) ? 0 : r.gamma;
      var ra = (r.alpha == null) ? 0 : r.alpha;
      var now = Date.now();
      var dt = _lt ? (now - _lt) / 1000 : 0;
      _lt = now;

      // 端末の向き: D=伏せ / U=表向き / M=その中間(返している最中)
      var o = (z > _FD) ? 'D' : (z < _FU ? 'U' : 'M');

      if (_st === 'up') {
        if (o === 'D') {
          if (_dwn === 0) _dwn = now;
          else if (now - _dwn >= _HOLD) { _st = 'wait'; _dwn = 0; }
        } else {
          _dwn = 0;
        }
      } else if (_st === 'wait') {
        if (o !== 'D') {                 // 伏せから動き出した＝返し開始
          _st = 'flip';
          _ib = rb * dt;
          _ig = rg * dt;
          _ia = ra * dt;
        }
      } else if (_st === 'flip') {
        _ib += rb * dt;                  // 返し中は回転を積算し続ける
        _ig += rg * dt;
        _ia += ra * dt;
        if (o === 'U') {                 // 表向きに到達＝返し完了、方向を確定
          var dir = _dir(_ia, _ib);
          var min = _dmap[dir] || 0;
          // 現在時刻＋補正分数で固定表示→2秒後に1分ずつ実時刻まで巻き戻し
          if (min > 0) {
            _rwGo(min);
          }
          _st = 'up';
        } else if (o === 'D') {          // 伏せに戻った＝やり直し
          _st = 'wait';
        }
      }
    }

    // 購読開始
    function _bind() {
      if (_on) return;
      _on = true;
      window.addEventListener('devicemotion', _rm);
    }

    // タップで許可要求（iOS 13+ はユーザー操作からの呼び出しが必須）
    function _ask() {
      var DM = window.DeviceMotionEvent;
      if (DM && typeof DM.requestPermission === 'function') {
        DM.requestPermission().then(function (res) {
          if (res === 'granted') {
            _bind();
          }
        }).catch(function () {});
      } else {
        // 非iOS / 許可不要な環境
        _bind();
      }
    }

    document.addEventListener('click', _ask);

    // 指定要素の「3回連続タップ（各タップ1秒以内）」で fn を呼ぶ共通ヘルパ
    function _tap3(el, fn) {
      var n = 0, last = 0;
      el.addEventListener('click', function () {
        var t = Date.now();
        n = (t - last <= 1000) ? n + 1 : 1;
        last = t;
        if (n >= 3) { n = 0; fn(); }
      });
    }

    // ライト(左下)を3回タップ → 巻き戻し等を中断して現在時刻へ強制リセット
    _tap3(_lb, function () {
      _rwStop();
    });

    // ------------------------------------------------------------
    // 表示設定（localStorage・難読化キー）
    // ------------------------------------------------------------
    var _ck = '_ncs1';        // 保存キー
    var _cfg = {};            // 設定値

    function _load() {
      try { _cfg = JSON.parse(localStorage.getItem(_ck)) || {}; } catch (e) { _cfg = {}; }
    }
    function _save() {
      try { localStorage.setItem(_ck, JSON.stringify(_cfg)); } catch (e) {}
    }

    // 背景（壁紙）関連
    var _bg = document.getElementById('_bg');
    var _bgf = document.getElementById('_bgf');
    var _sws = [
      document.getElementById('_sw0'),
      document.getElementById('_sw1'),
      document.getElementById('_sw2'),
      document.getElementById('_sw3'),
      document.getElementById('_sw4'),
      document.getElementById('_sw5'),
      document.getElementById('_sw6')
    ];
    function _markSw() {
      var cur = _cfg.bg || '';
      _sws.forEach(function (el) {
        el.classList.toggle('on', (el.getAttribute('data-bg') || '') === cur);
      });
    }
    // 'url("paper03.png")' → 'paper03.png'
    function _urlOf(s) {
      var m = /url\(["']?(.*?)["']?\)/.exec(s || '');
      return m ? m[1] : (s || '');
    }
    // 画像の下端1行の平均色を求めてコールバックで返す（境目消し用）
    function _bcFromUrl(src, cb) {
      var img = new Image();
      img.onload = function () {
        try {
          var cv = document.createElement('canvas');
          cv.width = img.width; cv.height = img.height;
          var ctx = cv.getContext('2d');
          ctx.drawImage(img, 0, 0);
          var px = ctx.getImageData(0, img.height - 1, img.width, 1).data;
          var r = 0, g = 0, b = 0;
          for (var p = 0; p < px.length; p += 4) { r += px[p]; g += px[p + 1]; b += px[p + 2]; }
          var n = px.length / 4;
          cb('rgb(' + Math.round(r / n) + ',' + Math.round(g / n) + ',' + Math.round(b / n) + ')');
        } catch (e) { cb('#000000'); }
      };
      img.onerror = function () { cb('#000000'); };
      img.src = src;
    }
    function _applyBg() {
      _bg.style.backgroundImage = _cfg.bg || '';
      // 画面外(オーバースクロール領域)の塗り色を、背景の下端色に合わせて境目を消す
      document.documentElement.style.backgroundColor = _cfg.bc || '#55b4e6';
      _markSw();
    }

    // 書体（キー→font-family）
    var _fmap = {
      '':      'ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif',
      'std':   '-apple-system, "SF Pro Display", system-ui, sans-serif',
      'light': '-apple-system, "SF Pro Display", system-ui, sans-serif',
      'serif': 'ui-serif, "Hiragino Mincho ProN", serif'
    };
    var _fwmap = { '': 600, 'std': 600, 'light': 300, 'serif': 600 };

    // #rrggbb → "r,g,b"
    function _hex2rgb(hex) {
      var h = (hex || '#ffffff').replace('#', '');
      if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
      var n = parseInt(h, 16);
      return ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255);
    }

    function _applyFont() {
      var ff = _cfg.ff || '';
      var root = document.documentElement.style;
      root.setProperty('--fcf', _fmap[ff] || _fmap['']);
      // 文字色（色＋濃さ）をまとめて rgba にして反映
      var fo = (_cfg.fo != null) ? _cfg.fo : 0.6;
      var rgb = _hex2rgb(_cfg.fc || '#ffffff');
      root.setProperty('--fccol', 'rgba(' + rgb + ',' + fo + ')');
      _c.style.fontWeight = _fwmap[ff] || 600;
      _d.style.fontWeight = _fwmap[ff] || 600;
    }

    // 保存済みの設定を実行時の値へ反映
    function _apply() {
      if (_cfg.dmap) _dmap = _cfg.dmap;
      if (_cfg.wait != null) _RW_WAIT = _cfg.wait;
      if (_cfg.step != null) _RW_STEP = _cfg.step;
      // 初期背景は paper04（未設定・旧paper03選択のどちらもpaper04へ。下端色は画像から算出）
      if (_cfg.bg == null || /paper03\.png/.test(_cfg.bg)) {
        _cfg.bg = 'url("paper04.png")';
        _bcFromUrl('paper04.png', function (bc) { _cfg.bc = bc; _save(); _applyBg(); });
      }
      _applyBg();
      _applyFont();
    }

    _load();
    _apply();

    // プリセット選択（標準に戻す＝先頭スウォッチ）
    _sws.forEach(function (el) {
      el.addEventListener('click', function () {
        var bg = el.getAttribute('data-bg') || '';
        _cfg.bg = bg;
        if (/^url\(/.test(bg)) {
          // 画像プリセットは下端色を画像から算出して境目を消す
          _bcFromUrl(_urlOf(bg), function (bc) { _cfg.bc = bc; _save(); _applyBg(); });
        } else {
          _cfg.bc = el.getAttribute('data-bc') || '';
        }
        _save();
        _applyBg();
      });
    });

    // 画像アップロード（縮小してlocalStorageに保存）
    _bgf.addEventListener('change', function () {
      var f = _bgf.files && _bgf.files[0];
      if (!f) return;
      var rd = new FileReader();
      rd.onload = function () {
        var img = new Image();
        img.onload = function () {
          var mx = 1400;
          var sc = Math.min(1, mx / Math.max(img.width, img.height));
          var cw = Math.round(img.width * sc), ch = Math.round(img.height * sc);
          var cv = document.createElement('canvas');
          cv.width = cw;
          cv.height = ch;
          var ctx = cv.getContext('2d');
          ctx.drawImage(img, 0, 0, cw, ch);
          // 下端1行の平均色を採取して画面外の塗り色に使う
          try {
            var px = ctx.getImageData(0, ch - 1, cw, 1).data;
            var r = 0, g = 0, b = 0;
            for (var p = 0; p < px.length; p += 4) { r += px[p]; g += px[p + 1]; b += px[p + 2]; }
            var n = px.length / 4;
            _cfg.bc = 'rgb(' + Math.round(r / n) + ',' + Math.round(g / n) + ',' + Math.round(b / n) + ')';
          } catch (e) { _cfg.bc = '#000000'; }
          _cfg.bg = 'url("' + cv.toDataURL('image/jpeg', 0.82) + '")';
          _save();
          _applyBg();
        };
        img.src = rd.result;
      };
      rd.readAsDataURL(f);
    });

    // 設定項目の入力欄
    var _keys = ['手前', '右', '奥', '左'];
    var _mi = [
      document.getElementById('_m0'),
      document.getElementById('_m1'),
      document.getElementById('_m2'),
      document.getElementById('_m3')
    ];
    var _ws = document.getElementById('_ws'); // 巻き戻し速度(秒/コマ)
    var _ww = document.getElementById('_ww'); // 開始待ち(秒)
    var _ff = document.getElementById('_ff'); // 書体
    var _fc = document.getElementById('_fc'); // 色
    var _fo = document.getElementById('_fo'); // 濃さ

    // 現在値を入力欄に反映（開くとき）
    function _fillSettings() {
      for (var i = 0; i < 4; i++) _mi[i].value = _dmap[_keys[i]];
      _ws.value = (_RW_STEP / 1000);
      _ww.value = (_RW_WAIT / 1000);
      _ff.value = _cfg.ff || '';
      _fc.value = _cfg.fc || '#ffffff';
      _fo.value = (_cfg.fo != null) ? _cfg.fo : 0.6;
    }

    // 入力欄から値を読み取り、実行時の値へ反映して保存
    function _readSettings() {
      var dm = {};
      for (var i = 0; i < 4; i++) {
        var v = parseInt(_mi[i].value, 10);
        dm[_keys[i]] = isNaN(v) ? 0 : v;
      }
      _dmap = dm;
      var s = parseFloat(_ws.value);
      if (!isNaN(s) && s > 0) _RW_STEP = Math.round(s * 1000);
      var w = parseFloat(_ww.value);
      if (!isNaN(w) && w >= 0) _RW_WAIT = Math.round(w * 1000);
      _cfg.dmap = _dmap;
      _cfg.step = _RW_STEP;
      _cfg.wait = _RW_WAIT;
      _cfg.ff = _ff.value;
      _cfg.fc = _fc.value;
      var fo = parseFloat(_fo.value);
      _cfg.fo = isNaN(fo) ? 0.6 : fo;
      _save();
      _applyFont();
    }

    // 各入力欄が変わるたびに保存（iOSはblurでchangeが発火）
    _mi.concat([_ws, _ww, _ff]).forEach(function (el) {
      el.addEventListener('change', _readSettings);
    });
    // 濃さのスライダー・色ピッカーはドラッグ中も即反映したいので input でも拾う
    _fo.addEventListener('input', _readSettings);
    _fc.addEventListener('input', _readSettings);

    // カメラ(右下)を3回タップ → 設定パネルを開く
    _tap3(_cb, function () { _fillSettings(); _sp.classList.add('on'); });
    _sx.addEventListener('click', function (e) { e.stopPropagation(); _readSettings(); _sp.classList.remove('on'); });
    _sp.addEventListener('click', function (e) { if (e.target === _sp) { _readSettings(); _sp.classList.remove('on'); } });
  })();
</script>

<!-- ライセンス確認（ID・パスコード＋1ID1端末ロック） -->
<script>
  (function () {
    'use strict';

    // 端末ID（初回に生成してlocalStorageへ）
    function _grdi() {
      var id = localStorage.getItem('_rtdev');
      if (!id) {
        id = 'rt-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
        localStorage.setItem('_rtdev', id);
      }
      return id;
    }

    var _rmsg = document.getElementById('_rmsg');
    var _rlb  = document.getElementById('_rlb');

    function _rshe(msg) { _rmsg.classList.remove('info'); _rmsg.textContent = msg; }
    function _rshi(msg) { _rmsg.classList.add('info'); _rmsg.textContent = msg; }
    function _rslb(loading) {
      _rlb.textContent = loading ? '確認中...' : 'ログイン';
      _rlb.disabled = loading;
      _rlb.style.opacity = loading ? '0.6' : '1';
    }
    function _rhga() { document.getElementById('_rag').classList.add('hidden'); }

    // ログイン処理
    function _ratl(id, pass) {
      var fns = window.__rfns, db = window.__rdb;
      return fns.getDoc(fns.doc(db, 'clock_licenses', id)).then(function (snap) {
        if (!snap.exists()) return { ok: false, reason: 'invalid' };
        var data = snap.data();
        if (data.passcode !== pass) return { ok: false, reason: 'invalid' };
        var myDev = _grdi();
        if (!data.deviceId) {
          return fns.updateDoc(fns.doc(db, 'clock_licenses', id), { deviceId: myDev })
            .then(function () { return { ok: true }; });
        }
        if (data.deviceId === myDev) return { ok: true };
        return { ok: false, reason: 'device' };
      });
    }

    // 自動ログイン（保存済みIDと端末IDの一致を確認）
    function _rtal() {
      var lid = localStorage.getItem('_rtlic');
      if (!lid) return Promise.resolve(false);
      var fns = window.__rfns, db = window.__rdb;
      return fns.getDoc(fns.doc(db, 'clock_licenses', lid)).then(function (snap) {
        if (!snap.exists()) { localStorage.removeItem('_rtlic'); return false; }
        if (snap.data().deviceId === _grdi()) { _rhga(); return true; }
        localStorage.removeItem('_rtlic');
        return false;
      }).catch(function () { return false; });
    }

    // 端末変更リクエスト
    function _rdcr() {
      var id   = document.getElementById('_rid').value.trim();
      var pass = document.getElementById('_rpc').value;
      if (!id || !pass) { _rshe('IDとパスコードを入力してください'); return; }
      if (!window.__rdb) { _rshe('接続中です。しばらくお待ちください'); return; }
      _rslb(true);
      var fns = window.__rfns, db = window.__rdb;
      fns.getDoc(fns.doc(db, 'clock_licenses', id)).then(function (snap) {
        if (!snap.exists() || snap.data().passcode !== pass) {
          _rshe('IDまたはパスコードが正しくありません'); _rslb(false); return;
        }
        var q = fns.query(
          fns.collection(db, 'clock_deviceRequests'),
          fns.where('licenseId', '==', id),
          fns.where('status', '==', 'pending')
        );
        return fns.getDocs(q).then(function (qs) {
          if (!qs.empty) {
            _rshi('すでに申請済みです。承認をお待ちください');
          } else {
            return fns.addDoc(fns.collection(db, 'clock_deviceRequests'), {
              licenseId: id, requestedAt: Date.now(), status: 'pending'
            }).then(function () { _rshi('申請を送信しました。承認をお待ちください'); });
          }
        });
      }).catch(function () {
        _rshe('エラーが発生しました。再度お試しください');
      }).finally(function () { _rslb(false); });
    }

    // ログインボタン
    _rlb.addEventListener('click', function () {
      var id   = document.getElementById('_rid').value.trim();
      var pass = document.getElementById('_rpc').value;
      if (!id || !pass) { _rshe('IDとパスコードを入力してください'); return; }
      if (!window.__rdb) { _rshe('接続中です。しばらくお待ちください'); return; }
      _rmsg.textContent = '';
      _rslb(true);
      _ratl(id, pass).then(function (res) {
        if (res.ok) {
          localStorage.setItem('_rtlic', id);
          _rhga();
        } else if (res.reason === 'device') {
          _rshe('別の端末で登録済みです');
        } else {
          _rshe('IDまたはパスコードが正しくありません');
        }
      }).catch(function () {
        _rshe('エラーが発生しました。再度お試しください');
      }).finally(function () { _rslb(false); });
    });

    // 端末変更リンク
    document.getElementById('_rdr').addEventListener('click', function (e) {
      e.preventDefault();
      _rdcr();
    });

    // Firebase 準備完了後に自動ログイン試行（順序保険つき）
    window.addEventListener('_rfsready', function () { _rtal().catch(function () {}); });
    if (window.__rdb) { _rtal().catch(function () {}); }
  })();
</script>
