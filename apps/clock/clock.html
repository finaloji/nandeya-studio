<style>

  html, body {

  /* ућ╗жЮбтцќ№╝ѕсѓфсЃ╝сЃљсЃ╝сѓ╣сѓ»сЃГсЃ╝сЃФжаўтЪЪ№╝ЅсЂЙсЂДтБЂу┤ЎсЂ«СИІуФ»УЅ▓сЂДтАЌсѓісђЂСИІсЂ«уЕ║уЎйсѓњжў▓сЂљ */

    background-color: #55b4e6;
  }

  body {
    font-family: -apple-system, "SF Pro Display", "Hiragino Sans", system-ui, sans-serif;
    color: #ffffff;
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;

  /* тБЂу┤ЎсЃгсѓцсЃцсЃ╝сђѓућ╗жЮбтЁеСйЊсѓњтЏ║т«џсЂДУдєсЂёсђЂти«сЂЌТЏ┐сЂѕтЈ»УЃйсЂФсЂЎсѓІсђѓ
     ТЌбт«џсЂ»iOSТеЎТ║ќсЂ«Т░┤УЅ▓сѓ░сЃЕсЃЄсЃ╝сѓисЃДсЃ│№╝ѕУ┐ЉС╝╝№╝ЅсђѓУеГт«џсЂДућ╗тЃЈсѓёсЃЌсЃфсѓ╗сЃЃсЃѕсЂФтцЅТЏ┤сЂДсЂЇсѓІ */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-color: transparent;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    background-image: linear-gradient(180deg,
      #9fddf3 0%,
      #86cfef 35%,
      #67bdea 70%,
      #55b4e6 100%);
  }

  /* ТЌЦС╗ў№╝ІТЎѓУеѕсЂ«сЂІсЂЪсЂЙсѓі */
  .head {
    position: absolute;
    top: 16%;
    left: 0;
    right: 0;
    text-align: center;
  }
  .date {
    font-family: var(--fcf, ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255, 255, 255, var(--fco, 0.6));
    margin-bottom: 2px;
  }
  .clock {
    font-family: var(--fcf, ui-rounded, "SF Pro Rounded", -apple-system, system-ui, sans-serif);
    font-size: 25vw;
    line-height: 1.0;
    font-weight: 600;
    letter-spacing: -3px;
    color: rgba(255, 255, 255, var(--fco, 0.6));

     Тъа(сѓ╣сЃГсЃЃсЃѕ)сЂ«С╗ЋухёсЂ┐сЂасЂЉсѓњућеТёЈсЂЌсђЂСИГУ║ФсЂ»УеГт«џсЂДти«сЂЌТЏ┐сЂѕсѓЅсѓїсѓІсѓѕсЂєсЂФсЂЎсѓІ */
  .wg {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 10px;
    padding: 0 22px;
  }
  .wg.off { display: none; }
  .wtile {
    height: 74px;
    border-radius: 18px;
    background: rgba(120, 120, 128, 0.28);

    backdrop-filter: blur(14px);

    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;

  .wtile.sm { width: 74px; }

    font-size: 11px;

  .wtile.gpt { background: #000; }

  /* тцЕТ░ЌсѓдсѓБсѓИсѓДсЃЃсЃѕсЂ«СИГУ║Ф */
  .wc-w {
    width: 100%;
    height: 100%;
    padding: 8px 9px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;

  .wc-w .tmp { font-size: 24px; font-weight: 500; line-height: 1; }

  /* СИІжЃесЂ«сЃЕсѓцсЃѕсЃ╗сѓФсЃАсЃЕсЃюсѓ┐сЃ│№╝ѕсЃГсЃЃсѓ»ућ╗жЮбсЂ«жБЙсѓі№╝Ѕ */

    position: absolute;
    left: 0;
    right: 0;
    bottom: env(safe-area-inset-bottom, 8px);
    display: flex;
    justify-content: space-between;
    padding: 0 46px;

    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    /* сЃЋсЃЂсЂ«ТўјсѓІсЂёсЃфсЃ│сѓ░№╝ІСИітЂ┤сЂ«сЃЈсѓцсЃЕсѓцсЃѕсЂДсѓгсЃЕсѓ╣сЂ«Тх«сЂЇТёЪсѓњтЄ║сЂЎ */

    box-shadow: inset 0 1px 1.5px rgba(255, 255, 255, 0.45),
                inset 0 -1px 2px rgba(255, 255, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;

  /* сѓ┐сЃЃсЃЌТАѕтєЁ№╝ѕУе▒тЈ»тЈќтЙЌтЅЇсЂ«сЂ┐УАеуц║сЃ╗ТјДсЂѕсѓЂ№╝Ѕ */

    left: 0;
    right: 0;
    top: 54%;
    text-align: center;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    transition: opacity 0.5s;
    pointer-events: none;
  }

  /* жќІуЎ║ућесѓ╗сЃ│сѓхсЃ╝УАеуц║№╝ѕСИђТЎѓуџёсђѓ2-1/2-2сЂ«ТцюУе╝тЙїсЂФтЅіжЎц№╝Ѕ */
  .dbg {
    position: absolute;
    left: 0;
    right: 0;
    bottom: calc(env(safe-area-inset-bottom, 8px) + 78px);
    text-align: center;
    font-size: 11px;
    line-height: 1.4;

  /* УАеуц║УеГт«џсЃЉсЃЇсЃФ№╝ѕжџасЂЌ№╝џсѓФсЃАсЃЕ3тЏъсѓ┐сЃЃсЃЌсЂДжќІсЂЈ№╝Ѕ */
  .sp {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0, 0, 0, 0.5);

    justify-content: center;

  .sp.on { display: flex; }
  .sp-panel {
    width: 86%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    background: #1c1c1e;
    color: #fff;
    border-radius: 16px;
    padding: 20px;
    box-sizing: border-box;

  .sp-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .sp-title { font-size: 18px; font-weight: 600; }
  .sp-close {
    font-size: 20px;
    color: #8e8e93;
    padding: 2px 10px;
    cursor: pointer;
  }
  .sp-body { font-size: 14px; color: #aeaeb2; line-height: 1.6; }
  .sp-sec {
    font-size: 12px;
    color: #8e8e93;
    margin: 16px 0 4px;
  }
  .sp-row {

    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid #2c2c2e;

  .sp-row input {
    width: 84px;
    background: #2c2c2e;
    border: none;
    color: #fff;
    font-size: 15px;
    text-align: right;
    padding: 7px 10px;

    -webkit-appearance: none;
    appearance: none;
  }
  .sp-sw {
    display: flex;
    gap: 12px;
    padding: 10px 0;
  }
  .sw {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    border: 2px solid transparent;
  }
  .sw.on { border-color: #0a84ff; }
  .sp-btnrow { padding: 6px 0 2px; }
  .sp-btn {
    display: inline-block;
    background: #2c2c2e;
    color: #0a84ff;
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
  }
  .sp-row select {
    background: #2c2c2e;
    border: none;
    color: #fff;
    font-size: 15px;
    padding: 7px 10px;
    border-radius: 8px;
    -webkit-appearance: none;
    appearance: none;
  }
  .sp-row input[type="range"] {
    width: 120px;
  }
  /* iOSжбесЃѕсѓ░сЃФсѓ╣сѓцсЃЃсЃЂ */
  .sp-row input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 50px;
    height: 30px;
    background: #39393d;
    border-radius: 15px;
    position: relative;
    transition: background 0.2s;
    cursor: pointer;
  }
  .sp-row input[type="checkbox"]::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 26px;
    height: 26px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .sp-row input[type="checkbox"]:checked {
    background: #34c759;
  }
  .sp-row input[type="checkbox"]:checked::after {
    transform: translateX(20px);
  }
</style>

    // С┐ЮтГўТИѕсЂ┐сЂ«УеГт«џсѓњт«ЪУАїТЎѓсЂ«тђцсЂИтЈЇТўа
    function _apply() {
      if (_cfg.dmap) _dmap = _cfg.dmap;
      if (_cfg.wait != null) _RW_WAIT = _cfg.wait;
      if (_cfg.step != null) _RW_STEP = _cfg.step;
      _applyBg();
      _applyFont();
      _applyWg();
    }

    _load();
    _apply();

    // сЃЌсЃфсѓ╗сЃЃсЃѕжЂИТіъ№╝ѕТеЎТ║ќсЂФТѕ╗сЂЎ№╝ЮтЁѕжаГсѓ╣сѓдсѓЕсЃЃсЃЂ№╝Ѕ
    _sws.forEach(function (el) {
      el.addEventListener('click', function () {
        _cfg.bg = el.getAttribute('data-bg') || '';
        _cfg.bc = el.getAttribute('data-bc') || '';
        _save();
        _applyBg();
      });
    });

    // ућ╗тЃЈсѓбсЃЃсЃЌсЃГсЃ╝сЃЅ№╝ѕуИ«т░ЈсЂЌсЂдlocalStorageсЂФС┐ЮтГў№╝Ѕ
    _bgf.addEventListener('change', function () {
      var f = _bgf.files && _bgf.files[0];
      if (!f) return;
      var rd = new FileReader();
      rd.onload = function () {
        var img = new Image();
        img.onload = function () {
          var mx = 1400;
          var sc = Math.min(1, mx / Math.max(img.width, img.height));
          var cw = Math.round(img.width * sc), ch = Math.round(img.height * sc);
          var cv = document.createElement('canvas');
          cv.width = cw;
          cv.height = ch;
          var ctx = cv.getContext('2d');
          ctx.drawImage(img, 0, 0, cw, ch);
          // СИІуФ»1УАїсЂ«т╣│тЮЄУЅ▓сѓњТјАтЈќсЂЌсЂдућ╗жЮбтцќсЂ«тАЌсѓіУЅ▓сЂФСй┐сЂє
          try {
            var px = ctx.getImageData(0, ch - 1, cw, 1).data;
            var r = 0, g = 0, b = 0;
            for (var p = 0; p < px.length; p += 4) { r += px[p]; g += px[p + 1]; b += px[p + 2]; }
            var n = px.length / 4;
            _cfg.bc = 'rgb(' + Math.round(r / n) + ',' + Math.round(g / n) + ',' + Math.round(b / n) + ')';
          } catch (e) { _cfg.bc = '#000000'; }
          _cfg.bg = 'url("' + cv.toDataURL('image/jpeg', 0.82) + '")';
          _save();
          _applyBg();
        };
        img.src = rd.result;
      };
      rd.readAsDataURL(f);
    });

    // УеГт«џжаЁуЏ«сЂ«тЁЦтіЏТгё
    var _keys = ['ТЅІтЅЇ', 'тЈ│', 'тЦЦ', 'тид'];
    var _mi = [
      document.getElementById('_m0'),
      document.getElementById('_m1'),
      document.getElementById('_m2'),
      document.getElementById('_m3')
    ];
    var _ws = document.getElementById('_ws'); // ти╗сЂЇТѕ╗сЂЌжђЪт║д(уДњ/сѓ│сЃъ)
    var _ww = document.getElementById('_ww'); // жќІтДІтЙЁсЂА(уДњ)
    var _ff = document.getElementById('_ff'); // ТЏИСйЊ
    var _fo = document.getElementById('_fo'); // Т┐ЃсЂЋ
    var _wgon = document.getElementById('_wgon'); // сѓдсѓБсѓИсѓДсЃЃсЃѕУАеуц║
    var _wgt = document.getElementById('_wgt');   // сѓдсѓБсѓИсѓДсЃЃсЃѕуе«жАъ

    // уЈЙтюетђцсѓњтЁЦтіЏТгёсЂФтЈЇТўа№╝ѕжќІсЂЈсЂесЂЇ№╝Ѕ
    function _fillSettings() {
      for (var i = 0; i < 4; i++) _mi[i].value = _dmap[_keys[i]];
      _ws.value = (_RW_STEP / 1000);
      _ww.value = (_RW_WAIT / 1000);
      _ff.value = _cfg.ff || '';
      _fo.value = (_cfg.fo != null) ? _cfg.fo : 0.6;
      _wgon.checked = !!_cfg.wgOn;
      _wgt.value = _cfg.wgType || 'line';
    }

    // тЁЦтіЏТгёсЂІсѓЅтђцсѓњУфГсЂ┐тЈќсѓісђЂт«ЪУАїТЎѓсЂ«тђцсЂИтЈЇТўасЂЌсЂдС┐ЮтГў
    function _readSettings() {
      var dm = {};
      for (var i = 0; i < 4; i++) {
        var v = parseInt(_mi[i].value, 10);
        dm[_keys[i]] = isNaN(v) ? 0 : v;
      }
      _dmap = dm;
      var s = parseFloat(_ws.value);
      if (!isNaN(s) && s > 0) _RW_STEP = Math.round(s * 1000);
      var w = parseFloat(_ww.value);
      if (!isNaN(w) && w >= 0) _RW_WAIT = Math.round(w * 1000);
      _cfg.dmap = _dmap;
      _cfg.step = _RW_STEP;
      _cfg.wait = _RW_WAIT;
      _cfg.ff = _ff.value;
      var fo = parseFloat(_fo.value);
      _cfg.fo = isNaN(fo) ? 0.6 : fo;
      _cfg.wgOn = _wgon.checked;
      _cfg.wgType = _wgt.value;
      _save();
      _applyFont();
      _applyWg();
    }

    // тљётЁЦтіЏТгёсЂїтцЅсѓЈсѓІсЂЪсЂ│сЂФС┐ЮтГў№╝ѕiOSсЂ»blurсЂДchangeсЂїуЎ║уЂФ№╝Ѕ
    _mi.concat([_ws, _ww, _ff, _wgon, _wgt]).forEach(function (el) {
      el.addEventListener('change', _readSettings);
    });
    // Т┐ЃсЂЋсЂ«сѓ╣сЃЕсѓцсЃђсЃ╝сЂ»сЃЅсЃЕсЃЃсѓ░СИГсѓѓтЇ│тЈЇТўасЂЌсЂЪсЂёсЂ«сЂД input сЂДсѓѓТІЙсЂє
    _fo.addEventListener('input', _readSettings);

    // сѓФсЃАсЃЕ(тЈ│СИІ)сѓњ3тЏъсѓ┐сЃЃсЃЌ Рєњ УеГт«џсЃЉсЃЇсЃФсѓњжќІсЂЈ
    _tap3(_cb, function () { _fillSettings(); _sp.classList.add('on'); });
    _sx.addEventListener('click', function (e) { e.stopPropagation(); _readSettings(); _sp.classList.remove('on'); });
    _sp.addEventListener('click', function (e) { if (e.target === _sp) { _readSettings(); _sp.classList.remove('on'); } });
  })();
</script>
</body>
</html>
