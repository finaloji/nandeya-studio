<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Roulette</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- 端末設定モジュール -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, query, where, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const _cfg = {
      apiKey: "AIzaSyBSSGdNDndjiUj40m4V4QA6Kjqr-oRnBc8",
      authDomain: "nandeya-magic-app.firebaseapp.com",
      projectId: "nandeya-magic-app",
      storageBucket: "nandeya-magic-app.firebasestorage.app",
      messagingSenderId: "181170873357",
      appId: "1:181170873357:web:b3c3fef8aea6390f37a144"
    };
    const _app = initializeApp(_cfg);
    const _db  = getFirestore(_app);
    window.__rdb  = _db;
    window.__rfns = { doc, getDoc, updateDoc, addDoc, collection, query, where, getDocs };
    window.dispatchEvent(new Event('_rfsready'));
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      height: 100%;
    }
    body {
      background: radial-gradient(circle at 50% 30%, #1a1a1c 0%, #050506 70%);
      color: #fff;
      font-family: -apple-system, 'SF Pro Display', system-ui, 'Hiragino Sans', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      overflow: hidden;
    }
    .stage {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 18px) 16px max(env(safe-area-inset-bottom), 24px);
    }

    /* タイトル（控えめ・上部中央） */
    .title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: #cfcfd2;
      text-align: center;
      flex: 0 0 auto;
    }

    /* 円盤エリア（主役） */
    .wheel-wrap {
      position: relative;
      width: min(86vw, 360px);
      aspect-ratio: 1 / 1;
      flex: 0 1 auto;
    }
    /* 矢印専用のタップ領域（見た目より一回り広く、円盤本体の判定とは別領域として扱う） */
    .arrow-hit {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 46px;
      z-index: 6;
    }
    /* 上部の固定矢印（12時方向を指す下向き三角） */
    .arrow {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 26px solid #ffd23f;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.6));
      z-index: 5;
    }
    /* 補正モードON時の表示微調整（矢印の色味をごくわずかに変えるだけ） */
    .arrow.on {
      border-top-color: #ffdc6b;
    }
    svg.wheel {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.55));
    }

    /* START/STOP ボタン（下部中央） */
    .action {
      flex: 0 0 auto;
      appearance: none;
      border: none;
      background: linear-gradient(180deg, #f4c150 0%, #e0a52c 100%);
      color: #1a1205;
      font-family: inherit;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.12em;
      min-width: 168px;
      padding: 15px 44px;
      border-radius: 999px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    /* 設定パネル（表示調整用の隠しパネル） */
    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
    }
    .panel-overlay.open {
      display: flex;
    }
    .panel-sheet {
      width: 100%;
      max-width: 480px;
      max-height: 86dvh;
      background: #16161a;
      border-top: 1px solid #2c2c31;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #26262b;
      flex: 0 0 auto;
    }
    .panel-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #f0f0f2;
    }
    .panel-close {
      appearance: none;
      border: none;
      background: #232328;
      color: #cfcfd2;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      font-size: 16px;
      line-height: 1;
    }
    .panel-body {
      overflow-y: auto;
      padding: 4px 16px 24px;
    }
    .panel-sec {
      padding: 14px 0;
      border-bottom: 1px solid #232328;
    }
    .panel-sec:last-child {
      border-bottom: none;
    }
    .panel-sec h3 {
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #b7b7bd;
      margin-bottom: 10px;
    }
    .panel-hint {
      font-size: 12px;
      color: #85858c;
      line-height: 1.5;
    }
    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .item-row input[type="radio"] {
      flex: 0 0 auto;
      width: 16px;
      height: 16px;
      accent-color: #f4c150;
    }
    .item-label {
      flex: 1 1 auto;
      min-width: 0;
      background: #0e0e10;
      border: 1px solid #2c2c31;
      color: #fff;
      font-family: inherit;
      font-size: 13.5px;
      padding: 9px 10px;
      border-radius: 8px;
    }
    .item-del {
      flex: 0 0 auto;
      appearance: none;
      border: none;
      background: #2a1417;
      color: #e5a3ab;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 8px;
    }
    .item-del:disabled {
      opacity: 0.35;
    }
    .panel-add {
      appearance: none;
      border: 1px dashed #3a3a41;
      background: transparent;
      color: #cfcfd2;
      font-size: 12.5px;
      font-family: inherit;
      padding: 9px 12px;
      border-radius: 8px;
      width: 100%;
      margin-top: 2px;
    }
    .panel-add:disabled {
      opacity: 0.35;
    }
    .ti-notice {
      margin-top: 8px;
      font-size: 12px;
      color: #ffd23f;
      min-height: 16px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .ti-notice.show {
      opacity: 1;
    }
    .theme-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .theme-item {
      appearance: none;
      border: 2px solid #2c2c31;
      background: #0e0e10;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      gap: 3px;
    }
    .theme-item.selected {
      border-color: #f4c150;
    }
    .theme-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
    }
    .range-row {
      margin-bottom: 12px;
    }
    .range-row .range-label {
      font-size: 12px;
      color: #b7b7bd;
      margin-bottom: 4px;
    }
    .range-row input[type="range"] {
      width: 100%;
      accent-color: #f4c150;
    }

    /* --- ログイン画面 --- */
    .login-screen {
      position: fixed;
      inset: 0;
      background: #050506;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .login-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .login-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f4c150;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .login-icon svg { width: 40px; height: 40px; }
    .login-title {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
    }
    .login-form { width: 100%; max-width: 320px; }
    .login-field {
      background: #1C1C1E;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .login-field input {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      width: 100%;
      outline: none;
    }
    .login-field input::placeholder { color: #8e8e93; }
    .login-error {
      color: #FF3B30;
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 8px;
      text-align: center;
    }
    .login-error.info { color: #30D158; }
    .login-btn {
      width: 100%;
      background: #f4c150;
      color: #1a1205;
      border: none;
      border-radius: 10px;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 24px;
    }
    .login-device-change {
      text-align: center;
      color: #8e8e93;
      font-size: 12px;
      line-height: 1.7;
    }
    .login-device-change a { color: #f4c150; }
  </style>
</head>
<body>
  <!-- ログイン画面 -->
  <div class="login-screen" id="_rag">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="#1a1205" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="1.8" fill="#1a1205"/>
        <line x1="12" y1="3" x2="12" y2="21" stroke="#1a1205" stroke-width="1.2"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke="#1a1205" stroke-width="1.2"/>
        <line x1="5.6" y1="5.6" x2="18.4" y2="18.4" stroke="#1a1205" stroke-width="1.2"/>
        <line x1="18.4" y1="5.6" x2="5.6" y2="18.4" stroke="#1a1205" stroke-width="1.2"/>
        <polygon points="12,1.4 10.4,4.2 13.6,4.2" fill="#1a1205"/>
      </svg>
    </div>
    <div class="login-title">ルーレット</div>
    <div class="login-form">
      <div class="login-field">
        <input id="_rid" type="text" placeholder="ID" autocomplete="off" autocorrect="off" autocapitalize="none">
      </div>
      <div class="login-field">
        <input id="_rpc" type="password" placeholder="パスコード" autocomplete="off">
      </div>
      <div class="login-error" id="_rmsg"></div>
      <button class="login-btn" id="_rlb">ログイン</button>
    </div>
  </div>

  <div class="stage">
    <div class="title">ルーレット</div>

    <div class="wheel-wrap">
      <div class="arrow-hit" id="arrowHit">
        <div class="arrow" id="arrow"></div>
      </div>
      <svg class="wheel" id="wheel" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
    </div>

    <button class="action" id="action" type="button">START</button>
  </div>

  <div class="panel-overlay" id="panelOverlay">
    <div class="panel-sheet" id="panelSheet">
      <div class="panel-head">
        <div class="panel-title">設定</div>
        <button type="button" class="panel-close" id="panelClose" aria-label="閉じる">×</button>
      </div>
      <div class="panel-body">
        <section class="panel-sec">
          <h3>表示項目</h3>
          <div class="item-list" id="itemList"></div>
          <button type="button" class="panel-add" id="itemAdd">追加</button>
        </section>
        <section class="panel-sec">
          <h3>基準項目</h3>
          <p class="panel-hint">上の一覧のラジオボタンで、基準にする項目を選べます。</p>
          <div class="ti-notice" id="tiNotice"></div>
        </section>
        <section class="panel-sec">
          <h3>テーマ</h3>
          <div class="theme-list" id="themeList"></div>
        </section>
        <section class="panel-sec">
          <h3>範囲</h3>
          <div class="range-list" id="rangeList"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    // 表示項目（設定パネルで追加・編集・削除可能。localStorageに保存）
    var _sg = ['ドンペリ', 'ビール', 'ハイボール', 'ワイン', 'カクテル', 'ソフトドリンク'];
    // 配色パレットのプリセット一式（設定パネルの「テーマ」から選択）
    var _plSet = [
      ['#C1121F', '#1B9AAA', '#2A6F97', '#E07A1F', '#6A4C93', '#118A50'],
      ['#8E2DE2', '#4A00E0', '#00B4D8', '#F72585', '#3A0CA3', '#4361EE'],
      ['#264653', '#2A9D8F', '#E9C46A', '#F4A261', '#E76F51', '#606C38'],
      ['#5A5A5A', '#7A7A7A', '#9A9A9A', '#3A3A3A', '#8C8C8C', '#4E4E4E']
    ];
    // 選択中の配色プリセットのインデックス
    var _pi = 0;
    // 選択中の配色パレット（色配列）
    var _pl = _plSet[_pi];
    // 各項目の重み（設定パネルの「範囲」で個別調整可能）
    var _wt = [];
    (function () {
      for (var i = 0; i < _sg.length; i++) _wt.push(1);
    })();
    // 基準項目のインデックス（設定パネルの「基準項目」で選択）
    var _ti = 0;

    // 表示項目数の下限・上限
    var _MIN_N = 2;
    var _MAX_N = 12;
    // ラベル文字数の上限
    var _MAX_LEN = 20;
    // 範囲（重み）の調整可能な最小・最大値
    var _WT_MIN = 0.15;
    var _WT_MAX = 3.0;

    var _NS = 'http://www.w3.org/2000/svg';
    var _CX = 150, _CY = 150, _R = 140;

    // ラベル長に応じた表示サイズ（自動縮小）
    function _fs(s) {
      var n = s.length;
      if (n <= 4) return 15;
      if (n <= 5) return 13.5;
      if (n <= 6) return 12;
      if (n <= 7) return 10.5;
      return 9.5;
    }

    // 境界角の配列を組み立てる（_wt の重み比から各項目の開始角・終了角を算出。
    // 「360を項目数で割る」決め打ちにはせず、重みの正規化で範囲を求める）
    function _buildBd() {
      var total = 0;
      for (var i = 0; i < _wt.length; i++) total += _wt[i];

      var raw = [0];
      var cum = 0;
      for (i = 0; i < _wt.length; i++) {
        cum += 360 * _wt[i] / total;
        raw.push(cum);
      }
      // 項目0の範囲中央が12時に来るよう全体をオフセット
      var offset = -(360 * _wt[0] / total) / 2;

      var bd = [];
      for (i = 0; i < _wt.length; i++) {
        bd.push({ a0: raw[i] + offset, a1: raw[i + 1] + offset });
      }
      return bd;
    }
    var _bd = _buildBd();

    // 円盤の描画（_sg と _pl と _bd から組み立てる）
    function _draw() {
      var svg = document.getElementById('wheel');
      while (svg.firstChild) svg.removeChild(svg.firstChild);

      var n = _sg.length;
      var g = document.createElementNS(_NS, 'g');
      g.setAttribute('id', 'disc');

      for (var i = 0; i < n; i++) {
        var seg = _bd[i];
        var a0 = (seg.a0 - 90) * Math.PI / 180;
        var a1 = (seg.a1 - 90) * Math.PI / 180;
        var x0 = _CX + _R * Math.cos(a0), y0 = _CY + _R * Math.sin(a0);
        var x1 = _CX + _R * Math.cos(a1), y1 = _CY + _R * Math.sin(a1);
        var large = (seg.a1 - seg.a0) > 180 ? 1 : 0;

        var p = document.createElementNS(_NS, 'path');
        p.setAttribute('d', 'M' + _CX + ' ' + _CY + ' L' + x0.toFixed(2) + ' ' + y0.toFixed(2) +
          ' A' + _R + ' ' + _R + ' 0 ' + large + ' 1 ' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' Z');
        p.setAttribute('fill', _pl[i % _pl.length]);
        p.setAttribute('stroke', '#0b0b0c');
        p.setAttribute('stroke-width', '1.5');
        g.appendChild(p);

        // ラベル：範囲の中央角に沿って放射方向に配置（内側→外側に読める向きで統一）
        var midDeg = (seg.a0 + seg.a1) / 2;    // 12時基準・時計回りの中央角
        var mid = (midDeg - 90) * Math.PI / 180;
        var lr = _R * 0.58;
        var lx = _CX + lr * Math.cos(mid), ly = _CY + lr * Math.sin(mid);
        var rot = midDeg - 90;                  // 放射方向（中心→外周）に統一。位置によらず反転しない

        var t = document.createElementNS(_NS, 'text');
        t.setAttribute('x', lx.toFixed(2));
        t.setAttribute('y', ly.toFixed(2));
        t.setAttribute('fill', '#ffffff');
        t.setAttribute('font-size', _fs(_sg[i]));
        t.setAttribute('font-weight', '700');
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('dominant-baseline', 'central');
        t.setAttribute('transform', 'rotate(' + rot.toFixed(2) + ' ' + lx.toFixed(2) + ' ' + ly.toFixed(2) + ')');
        t.textContent = _sg[i];
        g.appendChild(t);
      }

      // 外周リングと中心ハブ
      var ring = document.createElementNS(_NS, 'circle');
      ring.setAttribute('cx', _CX); ring.setAttribute('cy', _CY); ring.setAttribute('r', _R);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#f4c150');
      ring.setAttribute('stroke-width', '4');
      g.appendChild(ring);

      var hub = document.createElementNS(_NS, 'circle');
      hub.setAttribute('cx', _CX); hub.setAttribute('cy', _CY); hub.setAttribute('r', '15');
      hub.setAttribute('fill', '#111114');
      hub.setAttribute('stroke', '#f4c150');
      hub.setAttribute('stroke-width', '3');
      g.appendChild(hub);

      svg.appendChild(g);
    }

    // ---- 設定の保存・復元 ----
    var _zk1 = 'rls_a1'; // 項目リスト
    var _zk2 = 'rls_a2'; // 基準項目インデックス
    var _zk3 = 'rls_a3'; // 配色テーマの選択
    var _zk4 = 'rls_a4'; // セグメント幅の重み

    // localStorage からの読み込み（壊れた値・型不一致は既定値のまま無視する）
    function _rl() {
      try {
        var s1 = localStorage.getItem(_zk1);
        if (s1) {
          var arr = JSON.parse(s1);
          if (Array.isArray(arr) && arr.length >= _MIN_N) _sg = arr;
        }
      } catch (e) {}

      try {
        var s4 = localStorage.getItem(_zk4);
        if (s4) {
          var w = JSON.parse(s4);
          if (Array.isArray(w) && w.length === _sg.length) _wt = w;
        }
      } catch (e) {}
      if (_wt.length !== _sg.length) {
        _wt = [];
        for (var i = 0; i < _sg.length; i++) _wt.push(1);
      }

      try {
        var s2 = localStorage.getItem(_zk2);
        if (s2 !== null) {
          var ti = parseInt(s2, 10);
          if (!isNaN(ti) && ti >= 0 && ti < _sg.length) _ti = ti;
        }
      } catch (e) {}
      if (_ti >= _sg.length || _ti < 0) _ti = 0;

      try {
        var s3 = localStorage.getItem(_zk3);
        if (s3 !== null) {
          var pi = parseInt(s3, 10);
          if (!isNaN(pi) && pi >= 0 && pi < _plSet.length) _pi = pi;
        }
      } catch (e) {}
      _pl = _plSet[_pi];
    }

    // localStorage への書き込み
    function _wl() {
      try {
        localStorage.setItem(_zk1, JSON.stringify(_sg));
        localStorage.setItem(_zk2, String(_ti));
        localStorage.setItem(_zk3, String(_pi));
        localStorage.setItem(_zk4, JSON.stringify(_wt));
      } catch (e) {}
    }

    _rl();
    _bd = _buildBd();
    _draw();

    // ---- 回転・停止まわり ----

    var _ang = 0;      // 円盤の現在回転角（度）
    var _spin = false; // 回転中フラグ
    var _land = false; // 減速中（着地の余韻を含む）フラグ
    var _a0 = 0, _a1 = 0, _t0 = 0, _dur = 0; // 減速開始時の起点角/到達角/開始時刻(ms)/所要時間(ms)
    var _spd = 320;    // 等速回転の角速度（度/秒）
    var _raf = null;   // requestAnimationFrame のID
    var _ft = 0;       // 等速回転ループの直前フレーム時刻(ms)
    var _AFTERGLOW = 1000; // 着地後、次の操作を受け付けるまでの静止時間(ms)

    // ---- 補正モードの切替判定（矢印3連打） ----
    var _am = false; // 補正モードの有効・無効
    var _ak = 0;     // 連続タップのカウント
    var _at = 0;     // 直前タップの時刻(ms)
    var _ac = 0;     // クールダウン解除時刻(ms)
    var _AK_GAP = 600;   // 連続とみなすタップ間隔の上限(ms)
    var _AK_COOL = 900;  // 成立直後のクールダウン(ms)

    function _ease(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    // 円盤の見た目の回転角を反映
    function _applyAngle() {
      var g = document.getElementById('disc');
      if (g) g.setAttribute('transform', 'rotate(' + _ang.toFixed(3) + ' ' + _CX + ' ' + _CY + ')');
    }

    // ボタン表示の更新
    function _setBtn(text) {
      var btn = document.getElementById('action');
      btn.textContent = text;
    }

    // 等速回転ループ
    function _spinTick(now) {
      if (!_spin) return;
      var dt = (now - _ft) / 1000;
      _ft = now;
      _ang += _spd * dt;
      _applyAngle();
      _raf = requestAnimationFrame(_spinTick);
    }

    // 回転開始処理
    function _go() {
      if (_spin || _land) return;
      _spin = true;
      _ak = 0; // 状態が変わるのでカウントは破棄
      _setBtn('STOP');
      _ft = performance.now();
      _raf = requestAnimationFrame(_spinTick);
    }

    // 到達角・着地項目の決定（起点角から、選ばれた項目の範囲内のどこかへの到達角と所要時間を算出。
    // 補正モードONのときは基準項目、OFFのときは従来通りランダムに項目を選ぶ）
    function _pickLanding() {
      var r = _am ? _ti : Math.floor(Math.random() * _bd.length);
      var seg = _bd[r];
      var p = seg.a0 + Math.random() * (seg.a1 - seg.a0);

      // 矢印（画面上部固定）の下に p の位置が来るために必要な円盤回転角(mod 360)
      var target = ((-p % 360) + 360) % 360;
      var curMod = ((_ang % 360) + 360) % 360;
      var diff = ((target - curMod) % 360 + 360) % 360;
      var extraTurns = 4 + Math.floor(Math.random() * 4); // 追加4〜7周ぶん

      _a0 = _ang;
      _a1 = _ang + diff + extraTurns * 360;
      _dur = 5000 + Math.random() * 3000; // 5〜8秒（じっくりじらしてから着地）
    }

    // 減速アニメーションの実行（rAFループ）
    function _landTick(now) {
      var t = (now - _t0) / _dur;
      if (t >= 1) t = 1;
      _ang = _a0 + (_a1 - _a0) * _ease(t);
      _applyAngle();

      if (t < 1) {
        _raf = requestAnimationFrame(_landTick);
      } else {
        // 着地。余韻の間は次の操作を受け付けない
        setTimeout(function () {
          _land = false;
          _setBtn('START');
        }, _AFTERGLOW);
      }
    }

    // 停止トリガー処理（STOPボタン・円盤タップ共通の入口）
    function _stop() {
      if (!_spin || _land) return;
      _spin = false;
      if (_raf) cancelAnimationFrame(_raf);
      _land = true;
      _ak = 0; // 状態が変わるのでカウントは破棄
      _pickLanding();
      _t0 = performance.now();
      _raf = requestAnimationFrame(_landTick);
    }

    // ボタンの押下時の分岐（アイドルなら開始、回転中なら停止、それ以外は無視）
    function _onAction() {
      if (_sp) return;
      if (!_spin && !_land) {
        _go();
      } else if (_spin && !_land) {
        _stop();
      }
    }

    // 円盤タップ時の分岐（回転中のみ停止として有効）
    function _onWheelTap() {
      if (_sp) return;
      if (_spin && !_land) {
        _stop();
      }
    }

    // 補正確認用の表示微調整（矢印の見た目をわずかに変えるだけ）
    function _usg() {
      var el = document.getElementById('arrow');
      if (!el) return;
      if (_am) {
        el.classList.add('on');
      } else {
        el.classList.remove('on');
      }
    }

    // 矢印専用領域タップ時の分岐（3連打での補正モード切替判定・回転中は従来通り停止トリガー）
    function _arm() {
      if (_sp) return;
      if (_land) {
        // 減速中・余韻中はあらゆる操作を無視
        _ak = 0;
        return;
      }
      if (_spin) {
        // 回転中は従来通り円盤停止のトリガーとしてのみ機能し、カウントは行わない
        _ak = 0;
        _stop();
        return;
      }

      var now = performance.now();

      if (now < _ac) {
        // 成立直後のクールダウン中は次のカウントの起点にしない
        _ak = 0;
        _at = 0;
        return;
      }

      if (_ak > 0 && (now - _at) > _AK_GAP) {
        // 間隔が空いたのでそれまでのカウントは破棄（このタップを新規1回目として数え直す）
        _ak = 0;
      }

      _ak++;
      _at = now;

      if (_ak >= 3) {
        _am = !_am;
        _usg();
        _ak = 0;
        _ac = now + _AK_COOL;
      }
    }

    // ---- 設定パネル（タイトル3連打で開閉） ----
    var _sp = false; // 設定パネルの表示中フラグ
    var _tk = 0;     // タイトル連続タップのカウント
    var _tt = 0;     // 直前タップの時刻(ms)
    var _tc = 0;     // クールダウン解除時刻(ms)
    var _tiNoticeTimer = null;

    // 設定パネルを開く
    function _so() {
      if (_spin || _land || _sp) return;
      _sp = true;
      _renderPanelAll();
      var ov = document.getElementById('panelOverlay');
      ov.classList.add('open');
    }

    // 設定パネルを閉じる
    function _sc() {
      _sp = false;
      var ov = document.getElementById('panelOverlay');
      ov.classList.remove('open');
    }

    // タイトル文字タップ時の分岐（3連打での設定パネル開閉判定。矢印用カウンターとは別実体）
    function _stl() {
      if (_sp) return;
      if (_spin || _land) {
        // 回転中・減速中はあらゆる操作を無視し、カウントにも加算しない
        _tk = 0;
        return;
      }

      var now = performance.now();

      if (now < _tc) {
        _tk = 0;
        _tt = 0;
        return;
      }

      if (_tk > 0 && (now - _tt) > _AK_GAP) {
        _tk = 0;
      }

      _tk++;
      _tt = now;

      if (_tk >= 3) {
        _tk = 0;
        _tc = now + _AK_COOL;
        _so();
      }
    }

    // 基準項目が自動的に変わったときの一時的な通知表示
    function _tiNotice() {
      var el = document.getElementById('tiNotice');
      if (!el) return;
      el.textContent = '基準項目が変わりました';
      el.classList.add('show');
      clearTimeout(_tiNoticeTimer);
      _tiNoticeTimer = setTimeout(function () {
        el.classList.remove('show');
        el.textContent = '';
      }, 3000);
    }

    // 表示項目一覧（表示項目・基準項目セクション共用）の描画
    function _renderItemList() {
      var wrap = document.getElementById('itemList');
      wrap.innerHTML = '';
      var canDelete = _sg.length > _MIN_N;

      for (var i = 0; i < _sg.length; i++) {
        (function (idx) {
          var row = document.createElement('div');
          row.className = 'item-row';

          var radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = 'tiRadio';
          radio.checked = (idx === _ti);
          radio.addEventListener('change', function () { _onTiPick(idx); });
          row.appendChild(radio);

          var label = document.createElement('input');
          label.type = 'text';
          label.className = 'item-label';
          label.maxLength = _MAX_LEN;
          label.value = _sg[idx];
          label.addEventListener('blur', function () { _onLabelBlur(idx, label); });
          row.appendChild(label);

          var del = document.createElement('button');
          del.type = 'button';
          del.className = 'item-del';
          del.textContent = '削除';
          del.disabled = !canDelete;
          del.addEventListener('click', function () { _onDeleteItem(idx); });
          row.appendChild(del);

          wrap.appendChild(row);
        })(i);
      }

      var addBtn = document.getElementById('itemAdd');
      addBtn.disabled = _sg.length >= _MAX_N;
    }

    // 範囲（重み）調整セクションの描画
    function _renderRangeList() {
      var wrap = document.getElementById('rangeList');
      wrap.innerHTML = '';

      for (var i = 0; i < _sg.length; i++) {
        (function (idx) {
          var row = document.createElement('div');
          row.className = 'range-row';

          var lab = document.createElement('div');
          lab.className = 'range-label';
          lab.textContent = _sg[idx];
          row.appendChild(lab);

          var input = document.createElement('input');
          input.type = 'range';
          input.min = String(_WT_MIN);
          input.max = String(_WT_MAX);
          input.step = '0.05';
          input.value = String(_wt[idx]);
          input.addEventListener('input', function () { _onRangeInput(idx, input.value); });
          row.appendChild(input);

          wrap.appendChild(row);
        })(i);
      }
    }

    // テーマ（配色プリセット）セクションの描画
    function _renderThemeList() {
      var wrap = document.getElementById('themeList');
      wrap.innerHTML = '';

      for (var i = 0; i < _plSet.length; i++) {
        (function (idx) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'theme-item' + (idx === _pi ? ' selected' : '');

          var palette = _plSet[idx];
          for (var c = 0; c < palette.length; c++) {
            var dot = document.createElement('span');
            dot.className = 'theme-dot';
            dot.style.background = palette[c];
            btn.appendChild(dot);
          }

          btn.addEventListener('click', function () { _onThemePick(idx); });
          wrap.appendChild(btn);
        })(i);
      }
    }

    // パネル全体（表示項目・範囲・テーマ）を再構築
    function _renderPanelAll() {
      _renderItemList();
      _renderRangeList();
      _renderThemeList();
    }

    // 基準項目のラジオボタン選択時
    function _onTiPick(i) {
      _ti = i;
      _wl();
      _draw();
    }

    // ラベル入力欄のフォーカスが外れたとき（この瞬間だけ反映・保存する）
    function _onLabelBlur(i, el) {
      var v = el.value.trim();
      if (!v) {
        el.value = _sg[i];
        return;
      }
      _sg[i] = v.slice(0, _MAX_LEN);
      el.value = _sg[i];
      _wl();
      _draw();
      _renderRangeList();
    }

    // 削除ボタン押下時
    function _onDeleteItem(i) {
      if (_sg.length <= _MIN_N) return;
      if (!confirm('この項目を削除しますか？')) return;

      _sg.splice(i, 1);
      _wt.splice(i, 1);

      var tiChanged = false;
      if (_ti === i) {
        _ti = 0;
        tiChanged = true;
      } else if (_ti > i) {
        _ti -= 1;
      }

      _bd = _buildBd();
      _draw();
      _wl();
      _renderItemList();
      _renderRangeList();

      if (tiChanged) _tiNotice();
    }

    // 追加ボタン押下時
    function _onAddItem() {
      if (_sg.length >= _MAX_N) return;

      _sg.push('項目' + (_sg.length + 1));

      var avg = 1;
      if (_wt.length) {
        var sum = 0;
        for (var k = 0; k < _wt.length; k++) sum += _wt[k];
        avg = sum / _wt.length;
      }
      _wt.push(avg);

      _bd = _buildBd();
      _draw();
      _wl();
      _renderItemList();
      _renderRangeList();

      var inputs = document.querySelectorAll('#itemList .item-label');
      if (inputs.length) {
        var last = inputs[inputs.length - 1];
        last.focus();
        last.select();
      }
    }

    // テーマ（配色プリセット）選択時
    function _onThemePick(i) {
      _pi = i;
      _pl = _plSet[_pi];
      _wl();
      _draw();
      _renderThemeList();
    }

    // 範囲スライダー操作時
    function _onRangeInput(i, val) {
      var v = parseFloat(val);
      if (isNaN(v)) return;
      if (v < _WT_MIN) v = _WT_MIN;
      if (v > _WT_MAX) v = _WT_MAX;
      _wt[i] = v;
      _bd = _buildBd();
      _draw();
      _wl();
    }

    // タップ・クリックの二重発火を避けつつ反応させる共通バインダー
    function bindBtn(el, action) {
      el.addEventListener('touchstart', function (e) { e.preventDefault(); }, { passive: false });
      el.addEventListener('touchend', function (e) { e.preventDefault(); action(); }, { passive: false });
      el.addEventListener('click', function () { action(); });
    }

    // 矢印専用領域用バインダー（円盤側のタップ判定へは伝播させない）
    function bindArrowHit(el, action) {
      el.addEventListener('touchstart', function (e) { e.preventDefault(); e.stopPropagation(); }, { passive: false });
      el.addEventListener('touchend', function (e) { e.preventDefault(); e.stopPropagation(); action(); }, { passive: false });
      el.addEventListener('click', function (e) { e.stopPropagation(); action(); });
    }

    bindBtn(document.getElementById('action'), _onAction);
    bindBtn(document.querySelector('.wheel-wrap'), _onWheelTap);
    bindArrowHit(document.getElementById('arrowHit'), _arm);
    bindBtn(document.querySelector('.title'), _stl);

    document.getElementById('panelClose').addEventListener('click', _sc);
    document.getElementById('itemAdd').addEventListener('click', _onAddItem);
    document.getElementById('panelOverlay').addEventListener('click', function (e) {
      if (e.target === this) _sc();
    });

    // ===== 端末初期化処理（ログイン・端末ロック） =====

    // 同時に使える端末数の上限（超過ログイン時は最古の端末から自動的に外れる）
    var _MAXDEV = 2;

    // 端末IDを取得/生成
    function _grdi() {
      var id = localStorage.getItem('_rdevid');
      if (!id) {
        id = 'rd-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
        localStorage.setItem('_rdevid', id);
      }
      return id;
    }

    // エラー表示
    function _rshe(msg) {
      var el = document.getElementById('_rmsg');
      el.classList.remove('info');
      el.textContent = msg;
    }

    // ローディング状態切替
    function _rslb(isLoading) {
      var btn = document.getElementById('_rlb');
      btn.textContent = isLoading ? '確認中...' : 'ログイン';
      btn.disabled = isLoading;
      btn.style.opacity = isLoading ? '0.6' : '1';
    }

    // 認証画面を隠す
    function _rhga() {
      document.getElementById('_rag').classList.add('hidden');
    }

    // 許可端末リストの取得（旧 deviceId 形式も吸収）
    function _rdev(data) {
      if (Array.isArray(data.devices)) return data.devices.slice();
      if (data.deviceId) return [data.deviceId];
      return [];
    }

    // この端末を許可リストへ（末尾＝最新。上限超過は先頭＝最古から削除）。
    // 変更後の配列を返す。すでに最新で書き換え不要なら null。
    function _radd(list, dev) {
      var i = list.indexOf(dev);
      if (i !== -1 && i === list.length - 1) return null;
      if (i !== -1) list.splice(i, 1);
      list.push(dev);
      while (list.length > _MAXDEV) list.shift();
      return list;
    }

    // ログイン処理（同時に使えるのは _MAXDEV 台まで。超過時は最古を自動的に外す）
    function _rtl(id, pass) {
      var fns = window.__rfns;
      var db  = window.__rdb;
      return fns.getDoc(fns.doc(db, 'roulette_licenses', id)).then(function (snap) {
        if (!snap.exists()) return { ok: false, reason: 'invalid' };
        var data = snap.data();
        if (data.passcode !== pass) return { ok: false, reason: 'invalid' };
        var next = _radd(_rdev(data), _grdi());
        if (next === null) return { ok: true };
        return fns.updateDoc(fns.doc(db, 'roulette_licenses', id), { devices: next })
          .then(function () { return { ok: true }; });
      });
    }

    // 自動ログイン試行
    function _rtal() {
      var lid = localStorage.getItem('_rlicid');
      if (!lid) return Promise.resolve(false);
      var fns = window.__rfns;
      var db  = window.__rdb;
      return fns.getDoc(fns.doc(db, 'roulette_licenses', lid)).then(function (snap) {
        if (!snap.exists()) { localStorage.removeItem('_rlicid'); return false; }
        var data = snap.data();
        if (_rdev(data).indexOf(_grdi()) !== -1) { _rhga(); return true; }
        localStorage.removeItem('_rlicid');
        return false;
      }).catch(function () { return false; });
    }

    // 認証ボタン
    document.getElementById('_rlb').addEventListener('click', function () {
      var id   = document.getElementById('_rid').value.trim();
      var pass = document.getElementById('_rpc').value;
      if (!id || !pass) { _rshe('IDとパスコードを入力してください'); return; }
      if (!window.__rdb) { _rshe('接続中です。しばらくお待ちください'); return; }
      document.getElementById('_rmsg').textContent = '';
      _rslb(true);
      _rtl(id, pass).then(function (res) {
        if (res.ok) {
          localStorage.setItem('_rlicid', id);
          _rhga();
        } else {
          _rshe('IDまたはパスコードが正しくありません');
        }
      }).catch(function () {
        _rshe('エラーが発生しました。再度お試しください');
      }).finally(function () {
        _rslb(false);
      });
    });

    // Firebase 準備完了後に自動ログイン試行
    window.addEventListener('_rfsready', function () {
      _rtal().catch(function () {});
    });
    if (window.__rdb) {
      _rtal().catch(function () {});
    }

    // Service Worker 登録（Android PWA対応）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
