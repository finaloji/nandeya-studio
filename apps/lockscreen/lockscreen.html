<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Screen</title>

  <style>
    :root {
      /* キー直径: 幅・高さ・上限の最小値（大画面で巨大化しない） */
      --kd: min(23vw, 11.5vh, 84px);
      --gx: calc(var(--kd) * 0.28); /* 横間隔 */
      --gy: calc(var(--kd) * 0.26); /* 縦間隔 */
    }
    @supports (height: 1svh) {
      :root { --kd: min(23vw, 11.5svh, 84px); }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: #000;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      color: #fff;
    }

    /* 壁紙: 暗色グラデーションの色ムラ＋すりガラス風の淡い光 */
    .veil {
      /* セーフエリア外（ステータスバー・ホームバー裏）まで確実に敷くため外周にはみ出させる */
      position: fixed;
      inset: -60px;
      z-index: 0;
      background:
        /* 下端は地色へフェードさせ、描画境界の段差を見えなくする */
        linear-gradient(to top, #000 0%, #000 6%, rgba(0, 0, 0, 0) 26%),
        radial-gradient(130% 100% at 18% 12%, rgba(120, 124, 135, 0.26) 0%, rgba(120, 124, 135, 0) 58%),
        radial-gradient(110% 90% at 85% 28%, rgba(100, 104, 116, 0.20) 0%, rgba(100, 104, 116, 0) 55%),
        radial-gradient(120% 95% at 62% 82%, rgba(85, 87, 97, 0.14) 0%, rgba(85, 87, 97, 0) 60%),
        radial-gradient(90% 70% at 35% 60%, rgba(70, 73, 84, 0.18) 0%, rgba(70, 73, 84, 0) 65%),
        linear-gradient(170deg, #17181c 0%, #0b0c0f 50%, #000 100%);
    }
    /* ぼかし壁紙らしい淡いハイライトのにじみ */
    .veil::before {
      content: '';
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(38% 26% at 28% 22%, rgba(195, 200, 210, 0.13) 0%, rgba(195, 200, 210, 0) 100%),
        radial-gradient(30% 22% at 72% 55%, rgba(175, 180, 192, 0.08) 0%, rgba(175, 180, 192, 0) 100%),
        radial-gradient(44% 30% at 50% 72%, rgba(160, 165, 178, 0.06) 0%, rgba(160, 165, 178, 0) 100%);
      filter: blur(28px);
    }
    /* 画面基準の黒フェード: 全レイヤーの上に重ね、下端を確実に真っ黒へ落とす */
    .veil::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30vh;
      background: linear-gradient(to top, #000 0%, #000 25%, rgba(0, 0, 0, 0) 100%);
    }

    /* 縦積みレイアウト（セーフエリア内） */
    .stack {
      position: fixed;
      inset: 0;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(env(safe-area-inset-top, 0px) + 10px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
    }

    .sp { width: 100%; }
    .sp-a { flex: 26 1 0; min-height: 30px; }
    .sp-b { flex: 20 1 0; min-height: 14px; }
    .sp-c { flex: 12 1 0; min-height: 10px; }

    .pad-hint {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      text-align: center;
    }

    .dot-row {
      display: flex;
      column-gap: 21px;
      margin-top: 22px;
    }
    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1.4px solid rgba(255, 255, 255, 0.92);
      background: transparent;
    }

    .pad-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--kd));
      column-gap: var(--gx);
      row-gap: var(--gy);
      justify-items: center;
    }

    .pad-key {
      width: var(--kd);
      height: var(--kd);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.17);
      /* 縁の艶: 左上と右下がわずかに明るいリム */
      box-shadow:
        inset 1px 1.2px 1.5px rgba(255, 255, 255, 0.32),
        inset -1px -1.2px 1.5px rgba(255, 255, 255, 0.20);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.45s ease-out;
    }
    .pad-key.on {
      background: rgba(255, 255, 255, 0.56);
      transition-duration: 0s;
    }
    /* 「0」は最下段の中央列のみ */
    .pad-key.key-z { grid-column: 2; }

    .key-num {
      font-size: calc(var(--kd) * 0.44);
      font-weight: 300;
      line-height: 1;
      color: #fff;
    }
    .key-sub {
      height: calc(var(--kd) * 0.17);
      margin-top: calc(var(--kd) * 0.02);
      font-size: calc(var(--kd) * 0.135);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #fff;
      line-height: 1.2;
    }

    /* 下部: 左「緊急」右「キャンセル」（外側キー列の中心に揃える） */
    .edge-row {
      display: grid;
      grid-template-columns: repeat(3, var(--kd));
      column-gap: var(--gx);
      justify-items: center;
    }
    .edge-act {
      grid-row: 1;
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      padding: 8px 4px;
      cursor: pointer;
      transition: opacity 0.4s ease-out;
    }
    .edge-act.on {
      opacity: 0.45;
      transition-duration: 0s;
    }
    .edge-l { grid-column: 1; }
    .edge-r { grid-column: 3; }
  </style>
</head>
<body>
  <div class="veil"></div>

  <div class="stack">
    <div class="sp sp-a"></div>

    <div class="pad-hint">パスコードを入力</div>

    <div class="dot-row">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <div class="sp sp-b"></div>

    <div class="pad-grid">
      <div class="pad-key"><span class="key-num">1</span><span class="key-sub"></span></div>
      <div class="pad-key"><span class="key-num">2</span><span class="key-sub">ABC</span></div>
      <div class="pad-key"><span class="key-num">3</span><span class="key-sub">DEF</span></div>
      <div class="pad-key"><span class="key-num">4</span><span class="key-sub">GHI</span></div>
      <div class="pad-key"><span class="key-num">5</span><span class="key-sub">JKL</span></div>
      <div class="pad-key"><span class="key-num">6</span><span class="key-sub">MNO</span></div>
      <div class="pad-key"><span class="key-num">7</span><span class="key-sub">PQRS</span></div>
      <div class="pad-key"><span class="key-num">8</span><span class="key-sub">TUV</span></div>
      <div class="pad-key"><span class="key-num">9</span><span class="key-sub">WXYZ</span></div>
      <div class="pad-key key-z"><span class="key-num">0</span><span class="key-sub"></span></div>
    </div>

    <div class="sp sp-c"></div>

    <div class="edge-row">
      <span class="edge-act edge-l">緊急</span>
      <span class="edge-act edge-r">キャンセル</span>
    </div>
  </div>

  <script>
    // タップハイライト: 押下は即時、離すとフェードで戻る
    document.querySelectorAll('.pad-key, .edge-act').forEach(function (_el) {
      var _dn = function () { _el.classList.add('on'); };
      var _up = function () { _el.classList.remove('on'); };
      _el.addEventListener('touchstart', _dn, { passive: true });
      _el.addEventListener('touchend', _up, { passive: true });
      _el.addEventListener('touchcancel', _up, { passive: true });
      _el.addEventListener('mousedown', _dn);
      _el.addEventListener('mouseup', _up);
      _el.addEventListener('mouseleave', _up);
    });

    // ブラウザ既定のタップ表現を抑止（長押しメニュー・ピンチ・スクロール）
    document.addEventListener('contextmenu', function (_e) { _e.preventDefault(); });
    document.addEventListener('gesturestart', function (_e) { _e.preventDefault(); });
    document.addEventListener('touchmove', function (_e) { _e.preventDefault(); }, { passive: false });
  </script>
</body>
</html>
