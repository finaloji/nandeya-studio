<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Screen</title>

  <style>
    :root {
      /* キー直径: 幅・高さ・上限の最小値（大画面で巨大化しない） */
      --kd: min(23vw, 11.5vh, 84px);
      --gx: calc(var(--kd) * 0.28); /* 横間隔 */
      --gy: calc(var(--kd) * 0.26); /* 縦間隔 */
    }
    @supports (height: 1svh) {
      :root { --kd: min(23vw, 11.5svh, 84px); }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: #000;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      color: #fff;
    }

    /* 壁紙: 暗色グラデーションの色ムラ＋すりガラス風の淡い光 */
    .veil {
      /* セーフエリア外（ステータスバー・ホームバー裏）まで確実に敷くため外周にはみ出させる */
      position: fixed;
      inset: -60px;
      z-index: 0;
      background:
        /* 下端は地色へフェードさせ、描画境界の段差を見えなくする */
        linear-gradient(to top, #000 0%, #000 6%, rgba(0, 0, 0, 0) 26%),
        radial-gradient(130% 100% at 18% 12%, rgba(120, 124, 135, 0.26) 0%, rgba(120, 124, 135, 0) 58%),
        radial-gradient(110% 90% at 85% 28%, rgba(100, 104, 116, 0.20) 0%, rgba(100, 104, 116, 0) 55%),
        radial-gradient(120% 95% at 62% 82%, rgba(85, 87, 97, 0.14) 0%, rgba(85, 87, 97, 0) 60%),
        radial-gradient(90% 70% at 35% 60%, rgba(70, 73, 84, 0.18) 0%, rgba(70, 73, 84, 0) 65%),
        linear-gradient(170deg, #17181c 0%, #0b0c0f 50%, #000 100%);
    }
    /* ぼかし壁紙らしい淡いハイライトのにじみ */
    .veil::before {
      content: '';
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(38% 26% at 28% 22%, rgba(195, 200, 210, 0.13) 0%, rgba(195, 200, 210, 0) 100%),
        radial-gradient(30% 22% at 72% 55%, rgba(175, 180, 192, 0.08) 0%, rgba(175, 180, 192, 0) 100%),
        radial-gradient(44% 30% at 50% 72%, rgba(160, 165, 178, 0.06) 0%, rgba(160, 165, 178, 0) 100%);
      filter: blur(28px);
    }
    /* 画面基準の黒フェード: 全レイヤーの上に重ね、下端を確実に真っ黒へ落とす */
    .veil::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30vh;
      background: linear-gradient(to top, #000 0%, #000 25%, rgba(0, 0, 0, 0) 100%);
    }

    /* 縦積みレイアウト（セーフエリア内） */
    .stack {
      position: fixed;
      inset: 0;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(env(safe-area-inset-top, 0px) + 10px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
    }

    .sp { width: 100%; }
    .sp-a { flex: 26 1 0; min-height: 30px; }
    .sp-b { flex: 20 1 0; min-height: 14px; }
    .sp-c { flex: 12 1 0; min-height: 10px; }

    .pad-hint {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      text-align: center;
    }

    .dot-row {
      display: flex;
      column-gap: 21px;
      margin-top: 22px;
    }
    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1.4px solid rgba(255, 255, 255, 0.92);
      background: transparent;
    }
    /* 入力済みドット: 即時に塗りつぶし（遅延演出なし） */
    .dot.fl {
      background: #fff;
    }
    /* エラー時の左右往復: ドット列のみ、水平方向に減衰しながら揺れる */
    .dot-row.jx {
      animation: jx 0.5s ease-in-out;
    }
    @keyframes jx {
      0%    { transform: translateX(0); }
      12%   { transform: translateX(-14px); }
      25%   { transform: translateX(13px); }
      38%   { transform: translateX(-11px); }
      50%   { transform: translateX(9px); }
      62%   { transform: translateX(-6px); }
      75%   { transform: translateX(4px); }
      88%   { transform: translateX(-2px); }
      100%  { transform: translateX(0); }
    }

    .pad-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--kd));
      column-gap: var(--gx);
      row-gap: var(--gy);
      justify-items: center;
    }

    .pad-key {
      width: var(--kd);
      height: var(--kd);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.17);
      /* 縁の艶: 左上と右下がわずかに明るいリム */
      box-shadow:
        inset 1px 1.2px 1.5px rgba(255, 255, 255, 0.32),
        inset -1px -1.2px 1.5px rgba(255, 255, 255, 0.20);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.45s ease-out;
    }
    .pad-key.on {
      background: rgba(255, 255, 255, 0.56);
      transition-duration: 0s;
    }
    /* 「0」は最下段の中央列のみ */
    .pad-key.key-z { grid-column: 2; }

    .key-num {
      font-size: calc(var(--kd) * 0.44);
      font-weight: 300;
      line-height: 1;
      color: #fff;
    }
    .key-sub {
      height: calc(var(--kd) * 0.17);
      margin-top: calc(var(--kd) * 0.02);
      font-size: calc(var(--kd) * 0.135);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #fff;
      line-height: 1.2;
    }

    /* 下部: 左「緊急」右「キャンセル」（外側キー列の中心に揃える） */
    .edge-row {
      display: grid;
      grid-template-columns: repeat(3, var(--kd));
      column-gap: var(--gx);
      justify-items: center;
    }
    .edge-act {
      grid-row: 1;
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      padding: 8px 4px;
      cursor: pointer;
      transition: opacity 0.4s ease-out;
    }
    .edge-act.on {
      opacity: 0.45;
      transition-duration: 0s;
    }
    .edge-l { grid-column: 1; }
    .edge-r { grid-column: 3; }

    /* 描画較正中の字形補正 */
    .edge-l.cw { font-weight: 500; }

    /* 表示終了処理: 画面全体を静かに減光する */
    body.zz .veil,
    body.zz .stack {
      opacity: 0;
      transition: opacity 0.9s ease-out;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="veil"></div>

  <div class="stack">
    <div class="sp sp-a"></div>

    <div class="pad-hint">パスコードを入力</div>

    <div class="dot-row">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <div class="sp sp-b"></div>

    <div class="pad-grid">
      <div class="pad-key"><span class="key-num">1</span><span class="key-sub"></span></div>
      <div class="pad-key"><span class="key-num">2</span><span class="key-sub">ABC</span></div>
      <div class="pad-key"><span class="key-num">3</span><span class="key-sub">DEF</span></div>
      <div class="pad-key"><span class="key-num">4</span><span class="key-sub">GHI</span></div>
      <div class="pad-key"><span class="key-num">5</span><span class="key-sub">JKL</span></div>
      <div class="pad-key"><span class="key-num">6</span><span class="key-sub">MNO</span></div>
      <div class="pad-key"><span class="key-num">7</span><span class="key-sub">PQRS</span></div>
      <div class="pad-key"><span class="key-num">8</span><span class="key-sub">TUV</span></div>
      <div class="pad-key"><span class="key-num">9</span><span class="key-sub">WXYZ</span></div>
      <div class="pad-key key-z"><span class="key-num">0</span><span class="key-sub"></span></div>
    </div>

    <div class="sp sp-c"></div>

    <div class="edge-row">
      <span class="edge-act edge-l">緊急</span>
      <span class="edge-act edge-r">キャンセル</span>
    </div>
  </div>

  <script>
    // タップハイライト: 押下は即時、離すとフェードで戻る
    document.querySelectorAll('.pad-key, .edge-act').forEach(function (_el) {
      var _dn = function () { _el.classList.add('on'); };
      var _up = function () { _el.classList.remove('on'); };
      _el.addEventListener('touchstart', _dn, { passive: true });
      _el.addEventListener('touchend', _up, { passive: true });
      _el.addEventListener('touchcancel', _up, { passive: true });
      _el.addEventListener('mousedown', _dn);
      _el.addEventListener('mouseup', _up);
      _el.addEventListener('mouseleave', _up);
    });

    // 入力バッファと画面の同期
    var _b = '';        // 入力バッファ（現在の桁列）
    var _q1 = [];       // 確定バッファ（セッション内のみ保持）
    var _lk = false;    // 判定処理中フラグ（この間の入力は受け付けない）
    var _bt = 0;        // 復帰用の保険タイマー
    var _mz = false;    // タッチ端末フラグ（マウスイベントの二重処理防止）
    var _ds = document.querySelectorAll('.dot');
    var _rw = document.querySelector('.dot-row');
    var _er = document.querySelector('.edge-r');
    var _el = document.querySelector('.edge-l');

    // 表示較正まわりの内部状態
    var _vm = false;    // 較正フラグ
    var _vt = 0;        // 較正の基準時刻
    var _dz = false;    // 表示終了後フラグ（以降の操作は無効）
    var _hp = 0;        // 較正用の計時
    var _hk = -1;       // 追跡中の接点ID

    // 較正値（秒）: 保存値があればそれを使う
    function _gd() {
      var _v = 30;
      try {
        var _s = parseFloat(localStorage.getItem('_vx3'));
        if (_s > 0) _v = _s;
      } catch (e) {}
      return _v;
    }

    // 較正状態の切替（表示は左下ラベルの字形補正のみ）
    function _vs(_o) {
      _vm = _o;
      if (_o) {
        _vt = Date.now();
        _q1 = [];
        try {
          localStorage.setItem('_vx1', '1');
          localStorage.setItem('_vx2', String(_vt));
        } catch (e) {}
        _el.classList.add('cw');
      } else {
        _vt = 0;
        try {
          localStorage.removeItem('_vx1');
          localStorage.removeItem('_vx2');
        } catch (e) {}
        _el.classList.remove('cw');
      }
    }

    // 読み込み時: 保存済みの較正状態を復元（基準時刻は保存値のまま）
    (function () {
      try {
        if (localStorage.getItem('_vx1') === '1') {
          var _t = parseInt(localStorage.getItem('_vx2'), 10);
          if (_t > 0) {
            _vm = true;
            _vt = _t;
            _el.classList.add('cw');
          } else {
            localStorage.removeItem('_vx1');
            localStorage.removeItem('_vx2');
          }
        }
      } catch (e) {}
    })();

    // ドット表示と右下ラベルをバッファに合わせて更新
    function _sy() {
      for (var i = 0; i < _ds.length; i++) {
        _ds[i].classList.toggle('fl', i < _b.length);
      }
      _er.textContent = _b.length ? '削除' : 'キャンセル';
    }

    // 判定終了: 全ドットを同時に空へ戻し、初期状態へ
    function _rs() {
      if (!_lk) return;
      _lk = false;
      clearTimeout(_bt);
      _rw.classList.remove('jx');
      _b = '';
      _sy();
    }

    // 1桁確定（押し下げ時点で呼ばれる）
    function _in(_d) {
      if (_lk || _b.length >= 6) return;
      _b += _d;
      _sy();
      if (_b.length === 6) {
        _lk = true;
        _q1.push(_b);
        // 描画同期の較正判定（6桁目確定時点の値で評価）
        var _ok = _vm && (Date.now() - _vt) >= _gd() * 1000;
        if (_ok) {
          _vs(false);
          _dz = true;
          // 全ドット塗りを一瞬見せてから表示終了処理へ
          setTimeout(_fo, 250);
        } else {
          // 全ドット塗りを一瞬見せてから揺れを開始
          setTimeout(function () { _rw.classList.add('jx'); }, 250);
          // animationend が発火しない環境向けの保険
          _bt = setTimeout(_rs, 1400);
        }
      }
    }

    // 最後の1桁を消す（押し下げ時点で確定・1タップ1桁）
    function _bk() {
      if (_lk || _b.length === 0) return;
      _b = _b.slice(0, -1);
      _sy();
    }

    // 表示終了処理: 全体を減光して停止（以降の操作は受け付けない）
    function _fo() {
      document.body.classList.add('zz');
    }

    // 左下ラベルの押下計時（3秒到達で較正状態を切替。1回の押下で1度のみ）
    function _h0() {
      if (_dz || _hp) return;
      _hp = setTimeout(function () {
        _hp = 0;
        if (_dz) return;
        _vs(!_vm);
      }, 3000);
    }
    function _h1() {
      if (_hp) {
        clearTimeout(_hp);
        _hp = 0;
      }
      _hk = -1;
    }
    _el.addEventListener('touchstart', function (_e) {
      _mz = true;
      if (_hk !== -1) return;
      _hk = _e.changedTouches[0].identifier;
      _h0();
    }, { passive: true });
    _el.addEventListener('touchmove', function (_e) {
      if (_hk === -1) return;
      for (var i = 0; i < _e.changedTouches.length; i++) {
        var _t = _e.changedTouches[i];
        if (_t.identifier !== _hk) continue;
        // 接点が反応領域から外れたら計時を破棄
        var _r = _el.getBoundingClientRect();
        if (_t.clientX < _r.left || _t.clientX > _r.right || _t.clientY < _r.top || _t.clientY > _r.bottom) _h1();
      }
    }, { passive: true });
    _el.addEventListener('touchend', function (_e) {
      for (var i = 0; i < _e.changedTouches.length; i++) {
        if (_e.changedTouches[i].identifier === _hk) _h1();
      }
    }, { passive: true });
    _el.addEventListener('touchcancel', function () { _h1(); }, { passive: true });
    _el.addEventListener('mousedown', function () {
      if (_mz) return;
      _h0();
    });
    _el.addEventListener('mouseup', _h1);
    _el.addEventListener('mouseleave', _h1);

    _rw.addEventListener('animationend', _rs);

    // 数字キー: touchstart / mousedown の押し下げ時点で確定
    document.querySelectorAll('.pad-key').forEach(function (_el) {
      var _d = _el.querySelector('.key-num').textContent;
      _el.addEventListener('touchstart', function (_e) {
        _mz = true;
        // 指ごとに1入力（同時押しは発生順に処理）
        for (var i = 0; i < _e.changedTouches.length; i++) _in(_d);
      }, { passive: true });
      _el.addEventListener('mousedown', function () {
        if (_mz) return;
        _in(_d);
      });
    });

    // 右下ラベル: 「削除」時のみ1桁消す（0桁の「キャンセル」はハイライトのみ）
    _er.addEventListener('touchstart', function () {
      _mz = true;
      _bk();
    }, { passive: true });
    _er.addEventListener('mousedown', function () {
      if (_mz) return;
      _bk();
    });

    // ブラウザ既定のタップ表現を抑止（長押しメニュー・ピンチ・スクロール）
    document.addEventListener('contextmenu', function (_e) { _e.preventDefault(); });
    document.addEventListener('gesturestart', function (_e) { _e.preventDefault(); });
    document.addEventListener('touchmove', function (_e) { _e.preventDefault(); }, { passive: false });
  </script>
</body>
</html>
