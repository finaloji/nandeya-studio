<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Screen</title>

  <style>
    :root {
      /* キー直径: 幅・高さ・上限の最小値（大画面で巨大化しない） */
      --kd: min(23vw, 11.5vh, 84px);
      --gx: calc(var(--kd) * 0.28); /* 横間隔 */
      --gy: calc(var(--kd) * 0.26); /* 縦間隔 */
      /* 二次画面のタイル寸法（同じく上限つき） */
      --td: min(19vw, 7.4vh, 64px);
    }
    @supports (height: 1svh) {
      :root {
        --kd: min(23vw, 11.5svh, 84px);
        --td: min(19vw, 7.4svh, 64px);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: #000;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      color: #fff;
    }

    /* 壁紙: 暗色グラデーションの色ムラ＋すりガラス風の淡い光 */
    .veil {
      /* セーフエリア外（ステータスバー・ホームバー裏）まで確実に敷くため外周にはみ出させる */
      position: fixed;
      inset: -60px;
      z-index: 0;
      background:
        /* 下端は地色へフェードさせ、描画境界の段差を見えなくする */
        linear-gradient(to top, #000 0%, #000 6%, rgba(0, 0, 0, 0) 26%),
        radial-gradient(130% 100% at 18% 12%, rgba(120, 124, 135, 0.26) 0%, rgba(120, 124, 135, 0) 58%),
        radial-gradient(110% 90% at 85% 28%, rgba(100, 104, 116, 0.20) 0%, rgba(100, 104, 116, 0) 55%),
        radial-gradient(120% 95% at 62% 82%, rgba(85, 87, 97, 0.14) 0%, rgba(85, 87, 97, 0) 60%),
        radial-gradient(90% 70% at 35% 60%, rgba(70, 73, 84, 0.18) 0%, rgba(70, 73, 84, 0) 65%),
        linear-gradient(170deg, #17181c 0%, #0b0c0f 50%, #000 100%);
    }
    /* ぼかし壁紙らしい淡いハイライトのにじみ */
    .veil::before {
      content: '';
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(38% 26% at 28% 22%, rgba(195, 200, 210, 0.13) 0%, rgba(195, 200, 210, 0) 100%),
        radial-gradient(30% 22% at 72% 55%, rgba(175, 180, 192, 0.08) 0%, rgba(175, 180, 192, 0) 100%),
        radial-gradient(44% 30% at 50% 72%, rgba(160, 165, 178, 0.06) 0%, rgba(160, 165, 178, 0) 100%);
      filter: blur(28px);
    }
    /* 画面基準の黒フェード: 全レイヤーの上に重ね、下端を確実に真っ黒へ落とす */
    .veil::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30vh;
      background: linear-gradient(to top, #000 0%, #000 25%, rgba(0, 0, 0, 0) 100%);
    }

    /* 縦積みレイアウト（セーフエリア内） */
    .stack {
      position: fixed;
      inset: 0;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(env(safe-area-inset-top, 0px) + 10px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
    }

    .sp { width: 100%; }
    .sp-a { flex: 26 1 0; min-height: 30px; }
    .sp-b { flex: 20 1 0; min-height: 14px; }
    .sp-c { flex: 12 1 0; min-height: 10px; }

    .pad-hint {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      text-align: center;
    }

    .dot-row {
      display: flex;
      column-gap: 21px;
      margin-top: 22px;
    }
    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1.4px solid rgba(255, 255, 255, 0.92);
      background: transparent;
    }
    /* 入力済みドット: 即時に塗りつぶし（遅延演出なし） */
    .dot.fl {
      background: #fff;
    }
    /* エラー時の左右往復: ドット列のみ、水平方向に減衰しながら揺れる */
    .dot-row.jx {
      animation: jx 0.5s ease-in-out;
    }
    @keyframes jx {
      0%    { transform: translateX(0); }
      12%   { transform: translateX(-14px); }
      25%   { transform: translateX(13px); }
      38%   { transform: translateX(-11px); }
      50%   { transform: translateX(9px); }
      62%   { transform: translateX(-6px); }
      75%   { transform: translateX(4px); }
      88%   { transform: translateX(-2px); }
      100%  { transform: translateX(0); }
    }

    .pad-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--kd));
      column-gap: var(--gx);
      row-gap: var(--gy);
      justify-items: center;
    }

    .pad-key {
      width: var(--kd);
      height: var(--kd);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.17);
      /* 縁の艶: 左上と右下がわずかに明るいリム */
      box-shadow:
        inset 1px 1.2px 1.5px rgba(255, 255, 255, 0.32),
        inset -1px -1.2px 1.5px rgba(255, 255, 255, 0.20);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.45s ease-out;
    }
    .pad-key.on {
      background: rgba(255, 255, 255, 0.56);
      transition-duration: 0s;
    }
    /* 「0」は最下段の中央列のみ */
    .pad-key.key-z { grid-column: 2; }

    .key-num {
      font-size: calc(var(--kd) * 0.44);
      font-weight: 300;
      line-height: 1;
      color: #fff;
    }
    .key-sub {
      height: calc(var(--kd) * 0.17);
      margin-top: calc(var(--kd) * 0.02);
      font-size: calc(var(--kd) * 0.135);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #fff;
      line-height: 1.2;
    }

    /* 下部: 左「緊急」右「キャンセル」（外側キー列の中心に揃える） */
    .edge-row {
      display: grid;
      grid-template-columns: repeat(3, var(--kd));
      column-gap: var(--gx);
      justify-items: center;
    }
    .edge-act {
      grid-row: 1;
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      padding: 8px 4px;
      cursor: pointer;
      transition: opacity 0.4s ease-out;
    }
    .edge-act.on {
      opacity: 0.45;
      transition-duration: 0s;
    }
    .edge-l { grid-column: 1; }
    .edge-r { grid-column: 3; }

    /* 描画較正中の字形補正 */
    .edge-l.cw { font-weight: 500; }

    /* ------------------------------------------------------------
       診断表示（較正一覧）: 下部シート
       通常時は画面外に控え、必要時のみ短くスライドで出入りする
       ------------------------------------------------------------ */
    .tray3 {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 0;
      z-index: 3;
      max-height: 33vh;
      padding: 10px 18px calc(env(safe-area-inset-bottom, 0px) + 18px);
      border-radius: 18px 18px 0 0;
      background: rgba(30, 31, 37, 0.6);
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      box-shadow: 0 -1px 0 rgba(255, 255, 255, 0.07);
      transform: translateY(110%);
      transition: transform 0.22s cubic-bezier(0.25, 0.6, 0.3, 1);
      pointer-events: none;
    }
    .tray3.up {
      transform: translateY(0);
      pointer-events: auto;
    }
    /* 上端の細い横バー（装飾のみ） */
    .t3-b {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.26);
      margin: 0 auto 10px;
    }
    /* 一覧領域: 5行ぶんで固定し、超過分は内側で縦送り */
    .t3-s {
      max-height: 140px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
    .t3-r {
      height: 28px;
      line-height: 28px;
      text-align: center;
      font-family: ui-monospace, 'SF Mono', 'Roboto Mono', Menlo, monospace;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.55);
    }
    /* 0件時の中央表示 */
    .t3-0 {
      height: 84px;
      line-height: 84px;
      text-align: center;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.32);
    }

    /* ------------------------------------------------------------
       二次画面（表示終了後の待機面）
       通常時は透明・非対話のまま壁紙の裏に控えている
       ------------------------------------------------------------ */
    .pane2 {
      position: fixed;
      inset: 0;
      z-index: 0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      opacity: 0;
      transform: scale(0.9);
      filter: blur(14px);
      pointer-events: none;
    }

    .sp-d { flex: 12 1 0; min-height: 8px; }
    .sp-e { flex: 10 1 0; min-height: 8px; }

    /* タイル一覧: 4列×5行 */
    .grid-b {
      display: grid;
      grid-template-columns: repeat(4, var(--td));
      column-gap: calc(var(--td) * 0.45);
      row-gap: calc(var(--td) * 0.28);
    }
    .gb-c {
      width: var(--td);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .gb-t {
      width: var(--td);
      height: var(--td);
      border-radius: calc(var(--td) * 0.235);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.28);
    }
    .gb-t svg { width: 100%; height: 100%; display: block; }
    .gb-l {
      margin-top: 4px;
      font-size: max(10px, calc(var(--td) * 0.17));
      font-weight: 400;
      color: #fff;
      line-height: 1.2;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
    }

    /* 中段の細長カプセル */
    .pill-b {
      display: flex;
      align-items: center;
      column-gap: 5px;
      padding: 7px 15px;
      border-radius: 999px;
      background: rgba(120, 120, 128, 0.38);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.92);
    }

    /* 最下段の横長パネル（ラベルなしタイル4個） */
    .bar-b {
      display: grid;
      grid-template-columns: repeat(4, var(--td));
      column-gap: calc(var(--td) * 0.45);
      padding: calc(var(--td) * 0.2);
      border-radius: calc(var(--td) * 0.53);
      background: rgba(120, 120, 128, 0.30);
      -webkit-backdrop-filter: blur(22px);
      backdrop-filter: blur(22px);
    }

    /* タイル地色 */
    .m1  { background: #000; }
    .m2  { background: #fff; }
    .m3  { background: #fff; }
    .m4  { background: linear-gradient(145deg, #33353c, #121318); }
    .m5  { background: #e9e5da; }
    .m6  { background: linear-gradient(180deg, #4a9ff5, #1868d1); }
    .m7  { background: #fff; }
    .m8  { background: #1c1c1e; }
    .m9  { background: radial-gradient(circle at 50% 42%, #9a9aa0, #55555c); }
    .m10 { background: #fff; }
    .m11 { background: #fff; }
    .m12 { background: #fff; }
    .m13 { background: #1c1c1e; }
    .m14 { background: #fff; }
    .m15 { background: #1c1c1e; }
    .m16 { background: linear-gradient(180deg, #26282e, #0e0f13); }
    .m17 { background: linear-gradient(180deg, #fb5c74, #fa233b); }
    .m18 { background: #000; }
    .m19 { background: #fff; }
    .m20 { background: linear-gradient(180deg, #a05cf7, #6e2bd9); }
    .n1  { background: linear-gradient(180deg, #5cd964, #2ec848); }
    .n2  { background: linear-gradient(180deg, #59b8f9, #1d77ef); }
    .n3  { background: radial-gradient(circle at 50% 45%, #5ac8fa, #1e6ae1); }

    /* 表示終了処理: 一次層は上方向へ抜けながら減光し、
       二次画面がわずかに拡大しつつ鮮明化して入れ替わる */
    body.zz .stack {
      opacity: 0;
      transform: translateY(-9%);
      transition:
        opacity 0.4s cubic-bezier(0.2, 0.6, 0.35, 1),
        transform 0.4s cubic-bezier(0.2, 0.6, 0.35, 1);
      pointer-events: none;
    }
    body.zz .pane2 {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
      transition:
        opacity 0.55s cubic-bezier(0.2, 0.65, 0.3, 1),
        transform 0.55s cubic-bezier(0.2, 0.65, 0.3, 1),
        filter 0.55s cubic-bezier(0.2, 0.65, 0.3, 1);
    }
  </style>
</head>
