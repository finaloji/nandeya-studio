<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>見積書・請求書作成ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif; background: #f0f2f5; color: #333; }

  .input-area { max-width: 600px; margin: 0 auto; padding: 12px; }
  .input-area h1 { font-size: 18px; text-align: center; margin-bottom: 12px; }

  .section { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .section-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 6px; }

  label { display: block; font-size: 13px; margin-bottom: 3px; color: #666; }
  input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; -webkit-appearance: none; background: #fff; }
  input[type="date"] { min-height: 44px; }

  .type-toggle { display: flex; gap: 8px; }
  .type-toggle button { flex: 1; padding: 12px; font-size: 18px; border: 3px solid #4a90d9; border-radius: 8px; background: #fff; color: #4a90d9; cursor: pointer; font-weight: 900; letter-spacing: 2px; }
  .type-toggle button.active { background: #4a90d9; color: #fff; }

  .placeholder-box { border: 2px dashed #ccc; border-radius: 8px; padding: 24px 14px; margin-bottom: 12px; text-align: center; color: #aaa; font-size: 13px; background: #fafafa; }
</style>
</head>
<body>

<div class="input-area">
  <h1>見積書・請求書作成ツール</h1>

  <!-- 書類タイプ切り替え -->
  <div class="section">
    <div class="type-toggle">
      <button id="btnEstimate" class="active" onclick="setType('estimate')">見積書</button>
      <button id="btnInvoice" onclick="setType('invoice')">請求書</button>
    </div>
  </div>

  <!-- 宛先 -->
  <div class="section">
    <div class="section-title">宛先</div>
    <label>宛名（会社名または個人名）</label>
    <input type="text" id="customerName" placeholder="株式会社◯◯">
    <label>担当者名</label>
    <input type="text" id="contactName" placeholder="山田 太郎">
  </div>

  <!-- 日付 -->
  <div class="section">
    <div class="section-title">日付</div>
    <label>発行日</label>
    <input type="date" id="issueDate">
    <div id="dueDateArea" style="display:none;">
      <label>支払期限</label>
      <input type="date" id="dueDate">
    </div>
  </div>

  <!-- 後続セクションのプレースホルダ -->
  <div class="placeholder-box">（次スプリントで実装予定）</div>
</div>

<script>
var docType = 'estimate';
var savedDueDate = '';

function pad2(n) {
  return ('0' + n).slice(-2);
}

function toDateValue(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

function getTodayValue() {
  return toDateValue(new Date());
}

function getNextMonthEndValue() {
  var d = new Date();
  // 翌月の最終日（翌々月の0日目）
  var end = new Date(d.getFullYear(), d.getMonth() + 2, 0);
  return toDateValue(end);
}

function setType(type) {
  if (docType === type) return;
  var dueArea = document.getElementById('dueDateArea');
  var dueInput = document.getElementById('dueDate');
  if (type === 'invoice') {
    dueInput.value = savedDueDate;
    dueArea.style.display = '';
  } else {
    savedDueDate = dueInput.value;
    dueArea.style.display = 'none';
  }
  docType = type;
  document.getElementById('btnEstimate').className = type === 'estimate' ? 'active' : '';
  document.getElementById('btnInvoice').className = type === 'invoice' ? 'active' : '';
}

function initForm() {
  document.getElementById('issueDate').value = getTodayValue();
  savedDueDate = getNextMonthEndValue();
}

initForm();
</script>
</body>
</html>
